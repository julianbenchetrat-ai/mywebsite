<!--
  Juju Browser — a tiny browser that lives in a tab.
  Open/close tabs · build & save your own sites · revisit them anytime · load real links.
  Your created sites persist across sessions via the artifact storage API.
-->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

<style>
  :root{
    --chrome:#241a36;        /* deep plum chrome */
    --chrome-2:#2f2347;
    --chrome-3:#3c2e58;
    --paper:#f5f3f9;         /* moonlight canvas */
    --card:#ffffff;
    --ink:#221733;
    --muted:#6f6880;
    --line:#e7e2f0;
    --accent:#7b5cff;        /* violet — the magic / the real web */
    --accent-soft:#ece7ff;
    --mine:#13b8a6;          /* jade — your sites & chat */
    --mine-soft:#d3f4ef;     /* jade tint */
    --home:#e3a52a;          /* lucky gold — home */
    --radius:11px;
    color-scheme: light;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:var(--chrome);
    font-family:"Plus Jakarta Sans",system-ui,-apple-system,sans-serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }
  .browser{height:100vh; display:flex; flex-direction:column}

  /* ---------- tab strip ---------- */
  .tabstrip{
    display:flex; align-items:flex-end; gap:2px;
    padding:8px 8px 0 8px; background:var(--chrome);
  }
  .tab{
    display:flex; align-items:center; gap:8px;
    max-width:220px; min-width:120px; height:38px;
    padding:0 10px; border-radius:9px 9px 0 0;
    background:var(--chrome-2); color:#c3cad6;
    cursor:pointer; user-select:none; position:relative;
    transition:background .12s;
  }
  .tab:hover{background:var(--chrome-3)}
  .tab.active{background:var(--paper); color:var(--ink)}
  .tab .fav{
    width:18px;height:18px;border-radius:5px;flex:0 0 auto;
    display:grid;place-items:center;font-size:11px;font-weight:600;color:#fff;
    font-family:"Bricolage Grotesque",serif;
  }
  .tab .label{
    flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    font-size:13px; font-weight:500;
  }
  .tab .x{
    width:18px;height:18px;border-radius:5px;flex:0 0 auto;
    display:grid;place-items:center;font-size:14px;line-height:1;color:inherit;opacity:.55;
  }
  .tab .x:hover{opacity:1;background:rgba(0,0,0,.12)}
  .newtab{
    width:34px;height:34px;margin:0 4px 2px;border:none;border-radius:8px;
    background:transparent;color:#9aa4b2;font-size:20px;cursor:pointer;flex:0 0 auto;
  }
  .newtab:hover{background:var(--chrome-2);color:#fff}

  /* ---------- toolbar ---------- */
  .toolbar{
    display:flex; align-items:center; gap:8px;
    padding:8px 12px; background:var(--paper); border-bottom:1px solid var(--line);
  }
  .navbtn{
    width:34px;height:34px;border:none;border-radius:8px;background:transparent;
    color:#475066;cursor:pointer;font-size:16px;display:grid;place-items:center;flex:0 0 auto;
  }
  .navbtn:hover:not(:disabled){background:#ecebe5}
  .navbtn:disabled{opacity:.3;cursor:default}
  .address{
    flex:1; display:flex; align-items:center; gap:0;
    background:var(--card); border:1.5px solid var(--line); border-radius:999px;
    height:38px; padding:0 6px 0 6px; overflow:hidden; transition:border-color .12s;
  }
  .address:focus-within{border-color:var(--accent)}
  .scheme{
    font-family:"Space Mono",monospace; font-size:11px; font-weight:500;
    padding:4px 9px; border-radius:999px; margin-right:6px; white-space:nowrap;
    background:var(--accent-soft); color:var(--accent);
  }
  .scheme.mine{background:var(--mine-soft);color:var(--mine)}
  .scheme.home{background:#f7eccf;color:#9a6f12}
  #url{
    flex:1; border:none; outline:none; background:transparent;
    font-family:"Space Mono",monospace; font-size:13px; color:var(--ink);
    height:100%;
  }
  .btn{
    border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;
    padding:8px 14px;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;
  }
  .btn.primary{background:var(--accent);color:#fff}
  .btn.primary:hover{background:#e25d40}
  .btn.ghost{background:#ecebe5;color:#475066}
  .btn.ghost:hover{background:#e2e0d8}
  .btn.mine{background:var(--mine);color:#fff}
  .btn.mine:hover{background:#37936f}

  /* ---------- content ---------- */
  .stage{flex:1; position:relative; background:var(--paper); overflow:hidden}
  .frame{position:absolute; inset:0; width:100%; height:100%; border:none; background:#fff}
  .scroll{position:absolute; inset:0; overflow:auto}

  /* home / new tab page */
  .home{max-width:920px;margin:0 auto;padding:54px 28px 60px}
  .brand{display:flex;align-items:center;gap:14px;margin-bottom:6px}
  .brand .logo{
    width:48px;height:48px;border-radius:17px 17px 17px 5px;
    background:linear-gradient(140deg,var(--accent) 0%,#9b7bff 50%,var(--mine) 130%);
    display:grid;place-items:center;color:#fff;font-family:"Bricolage Grotesque",serif;font-size:25px;font-weight:700;
    box-shadow:0 8px 22px rgba(123,92,255,.4);
  }
  .brand h1{font-family:"Bricolage Grotesque",serif;font-weight:800;font-size:36px;margin:0;letter-spacing:-1px}
  .brand p{margin:3px 0 0;color:var(--muted);font-size:14px}
  .homebar{
    display:flex;gap:10px;margin:28px 0 38px;
  }
  .homebar input{
    flex:1;height:48px;border:1.5px solid var(--line);border-radius:12px;background:#fff;
    padding:0 18px;font-family:"Space Mono",monospace;font-size:14px;outline:none;color:var(--ink);
  }
  .homebar input:focus{border-color:var(--accent)}
  .sectlabel{
    display:flex;align-items:center;gap:10px;margin:0 0 16px;
    font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
  }
  .sectlabel::after{content:"";flex:1;height:1px;background:var(--line)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;
    cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s;position:relative;
  }
  .card:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(30,30,40,.08);border-color:#d8d4cb}
  .card .fav{
    width:38px;height:38px;border-radius:10px;display:grid;place-items:center;
    color:#fff;font-family:"Bricolage Grotesque",serif;font-size:18px;font-weight:600;margin-bottom:12px;
  }
  .card h3{margin:0 0 3px;font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card .sub{font-size:11.5px;color:var(--muted);font-family:"Space Mono",monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card .acts{display:flex;gap:6px;margin-top:12px;opacity:0;transition:opacity .12s}
  .card:hover .acts{opacity:1}
  .card .acts button{
    border:none;background:#f1efe9;color:#5a6172;border-radius:7px;padding:5px 9px;font-size:11px;
    font-weight:600;cursor:pointer;font-family:inherit;
  }
  .card .acts button:hover{background:#e6e3db}
  .card .acts button.del:hover{background:#fbe3dd;color:#c0432a}
  .card.new{
    border-style:dashed;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;color:var(--mine);min-height:128px;
  }
  .card.new .plus{font-size:30px;line-height:1;margin-bottom:6px}
  .card.new span{font-size:13px;font-weight:600}
  .empty{color:var(--muted);font-size:13.5px;padding:6px 2px}
  .quick{display:flex;flex-wrap:wrap;gap:8px}
  .chip{
    border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 15px;font-size:13px;
    cursor:pointer;color:var(--ink);transition:border-color .12s,background .12s;font-weight:500;
  }
  .chip:hover{border-color:var(--accent);background:var(--accent-soft)}
  .hint{margin-top:30px;font-size:12px;color:var(--muted);line-height:1.6;max-width:640px}
  .hint code{font-family:"Space Mono",monospace;background:#ecebe5;padding:1px 6px;border-radius:5px;font-size:11px}

  /* editor */
  .editor{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--paper)}
  .editor .ehead{
    display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--line);background:#fff;
  }
  .editor .ehead .mlogo{
    width:34px;height:34px;border-radius:9px;background:var(--mine);display:grid;place-items:center;color:#fff;
    font-family:"Bricolage Grotesque",serif;font-size:17px;flex:0 0 auto;
  }
  .editor input.name{
    flex:1;max-width:340px;height:38px;border:1.5px solid var(--line);border-radius:9px;padding:0 14px;
    font-family:"Plus Jakarta Sans";font-size:15px;font-weight:600;outline:none;
  }
  .editor input.name:focus{border-color:var(--mine)}
  .editor .spacer{flex:1}
  .editor .ebody{flex:1;display:flex;min-height:0}
  .editor .codepane{display:flex;flex-direction:column;width:48%;min-width:280px;border-right:1px solid var(--line)}
  .editor .codetab{
    padding:8px 16px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
    border-bottom:1px solid var(--line);background:#fbfaf7;
  }
  .editor textarea{
    flex:1;border:none;outline:none;resize:none;padding:16px 18px;background:#fbfaf7;
    font-family:"Space Mono",monospace;font-size:13px;line-height:1.65;color:#2b3242;tab-size:2;
  }
  .editor .preview{flex:1;display:flex;flex-direction:column;min-width:0}
  .editor .prevtab{
    padding:8px 16px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
    border-bottom:1px solid var(--line);background:#fff;display:flex;align-items:center;gap:8px;
  }
  .editor .prevtab .dot{width:7px;height:7px;border-radius:50%;background:var(--mine)}
  .editor iframe.prev{flex:1;border:none;background:#fff}

  /* real-site fallback / loader */
  .overlay{
    position:absolute;left:0;right:0;top:0;display:flex;align-items:center;gap:12px;
    padding:10px 16px;background:#fff;border-bottom:1px solid var(--line);font-size:13px;color:var(--muted);
    z-index:3;
  }
  .overlay .spin{
    width:15px;height:15px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;
    animation:spin .7s linear infinite;flex:0 0 auto;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .overlay .grow{flex:1}
  .blocked{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:40px;gap:16px;background:var(--paper);z-index:2;
  }
  .blocked .ic{font-size:42px}
  .blocked h2{font-family:"Bricolage Grotesque",serif;font-weight:600;margin:0;font-size:24px}
  .blocked p{margin:0;color:var(--muted);max-width:420px;line-height:1.6;font-size:14px}
  .blocked code{font-family:"Space Mono",monospace;background:#ecebe5;padding:2px 7px;border-radius:6px}

  /* not found */
  .notfound{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;text-align:center;padding:40px}
  .notfound .ic{font-size:46px}
  .notfound h2{font-family:"Bricolage Grotesque",serif;margin:0;font-size:24px}
  .notfound p{margin:0;color:var(--muted)}

  /* search results */
  .results{max-width:760px;margin:0 auto;padding:36px 28px 60px}
  .results .q{font-family:"Bricolage Grotesque",serif;font-size:26px;font-weight:600;margin:0 0 3px;letter-spacing:-.3px}
  .results .qsub{color:var(--muted);font-size:13px;margin:0 0 24px}
  .minihit{display:flex;align-items:center;gap:11px;padding:11px 13px;background:var(--mine-soft);border-radius:11px;margin-bottom:8px;cursor:pointer;transition:background .12s}
  .minihit:hover{background:#cdebe0}
  .minihit .f{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;color:#fff;font-family:"Bricolage Grotesque",serif;font-size:14px;flex:0 0 auto}
  .minihit b{font-size:14px}
  .minihit .s{font-family:"Space Mono",monospace;font-size:11px;color:var(--mine);margin-left:auto}
  .result{padding:15px 0;border-bottom:1px solid var(--line);cursor:pointer}
  .result:first-child{padding-top:6px}
  .result .rhost{font-family:"Space Mono",monospace;font-size:11.5px;color:var(--mine);margin:0 0 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .result h3{margin:0 0 4px;font-size:16px;font-weight:600;color:#1a4fae}
  .result:hover h3{text-decoration:underline}
  .result p{margin:0;color:#4b5563;font-size:13.5px;line-height:1.55}
  .searchload{display:flex;align-items:center;gap:11px;color:var(--muted);font-size:14px;padding:18px 0}
  .searchload .spin{width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex:0 0 auto}
  .enginerow{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:24px;padding-top:18px;border-top:1px solid var(--line)}
  .enginerow .lab{font-size:12.5px;color:var(--muted);margin-right:2px}
  .errbox{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 18px;color:var(--muted);font-size:13.5px;line-height:1.6}

  /* block builder */
  .bcol{width:48%;min-width:300px;border-right:1px solid var(--line);overflow:auto;background:#fbfaf7;padding:14px}
  .themecard{background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:14px}
  .themecard .tt{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:11px}
  .row3{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
  .row3>.field{flex:1;min-width:120px;margin-bottom:0}
  .field{margin-bottom:11px}
  .field>label{display:block;font-size:11.5px;font-weight:600;color:#5a6172;margin-bottom:5px}
  .field input[type=text],.field textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-family:inherit;font-size:13.5px;outline:none;background:#fff;color:var(--ink)}
  .field textarea{resize:vertical;min-height:56px;line-height:1.5}
  .field input[type=text]:focus,.field textarea:focus{border-color:var(--mine)}
  .field.color{display:flex;align-items:center;gap:9px}
  .field.color>label{margin:0;flex:1}
  .field.color input[type=color]{width:40px;height:32px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:2px;cursor:pointer;flex:0 0 auto}
  .field.check{display:flex;align-items:center;gap:8px}
  .field.check>label{margin:0;font-size:13px;color:#3a4251}
  .field.check input{width:16px;height:16px;accent-color:var(--mine)}
  .hintline{font-size:12.5px;color:var(--muted);margin:2px 0 0}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{border:none;background:#fff;padding:7px 12px;font-size:12.5px;cursor:pointer;color:#5a6172;font-family:inherit;border-left:1px solid var(--line)}
  .seg button:first-child{border-left:none}
  .seg button.on{background:var(--mine);color:#fff}
  .bcard{background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px;margin-bottom:11px}
  .bcard-head{display:flex;align-items:center;gap:8px;margin-bottom:11px}
  .bcard-head .ico{width:26px;height:26px;border-radius:7px;background:var(--mine-soft);display:grid;place-items:center;font-size:14px;flex:0 0 auto}
  .bcard-head .nm{font-size:12.5px;font-weight:700;color:#3a4251;flex:1}
  .bcard-head button{border:none;background:#f1efe9;color:#5a6172;width:27px;height:27px;border-radius:7px;cursor:pointer;font-size:13px;flex:0 0 auto}
  .bcard-head button:hover{background:#e6e3db}
  .bcard-head button.del:hover{background:#fbe3dd;color:#c0432a}
  .palette{background:#fff;border:1.5px dashed var(--mine);border-radius:12px;padding:13px;margin-top:4px}
  .palette .pt{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mine);margin-bottom:10px}
  .palgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:8px}
  .palbtn{display:flex;flex-direction:column;align-items:center;gap:5px;border:1px solid var(--line);background:#fff;border-radius:10px;padding:11px 6px;cursor:pointer;font-size:11.5px;font-weight:600;color:#3a4251;transition:border-color .12s,background .12s}
  .palbtn:hover{border-color:var(--mine);background:var(--mine-soft)}
  .palbtn .pi{font-size:18px;line-height:1}

  /* incognito */
  .incpill{
    font-family:"Space Mono",monospace;font-size:11px;font-weight:500;color:#cbb8ff;
    background:rgba(108,80,200,.18);border:1px solid rgba(108,80,200,.4);padding:4px 10px;border-radius:999px;white-space:nowrap;
  }
  body.incognito{--chrome:#16141c;--chrome-2:#23202b;--chrome-3:#2f2b39;--paper:#e9e7ee;--line:#d6d2e0}
  body.incognito .toolbar{background:#e9e7ee}
  .navbtn.on{background:#e7defb;color:#5b3fb0}

  /* account chip + menu */
  .acctchip{
    width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;flex:0 0 auto;
    background:var(--accent);color:#fff;font-weight:600;font-family:"Bricolage Grotesque",serif;font-size:15px;
  }
  .acctchip:hover{filter:brightness(.95)}
  .acctmenu{
    position:absolute;top:54px;right:12px;z-index:20;width:230px;background:#fff;border:1px solid var(--line);
    border-radius:13px;box-shadow:0 14px 40px rgba(20,20,30,.18);padding:8px;
  }
  .acctmenu .who{padding:11px 12px 12px;border-bottom:1px solid var(--line);margin-bottom:6px}
  .acctmenu .who .nm{font-weight:600;font-size:14px}
  .acctmenu .who .lb{font-size:11.5px;color:var(--muted);margin-top:2px}
  .acctmenu button{
    width:100%;text-align:left;border:none;background:transparent;border-radius:9px;padding:10px 12px;
    font-family:inherit;font-size:13.5px;color:var(--ink);cursor:pointer;display:flex;align-items:center;gap:9px;
  }
  .acctmenu button:hover{background:#f1efe9}
  .acctmenu button.danger:hover{background:#fbe3dd;color:#c0432a}

  /* lock / sign-in screen */
  #lock{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    background:radial-gradient(120% 120% at 50% 0%, #2c3543 0%, #1b2129 60%, #141a20 100%);padding:20px;z-index:50}
  #lock.show{display:flex}
  .lockcard{width:100%;max-width:380px;background:var(--paper);border-radius:20px;padding:34px 30px 28px;
    box-shadow:0 30px 80px rgba(0,0,0,.45)}
  .lockcard .lb{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .lockcard .logo{width:48px;height:48px;border-radius:17px 17px 17px 5px;background:linear-gradient(140deg,var(--accent) 0%,#9b7bff 50%,var(--mine) 130%);display:grid;place-items:center;
    color:#fff;font-family:"Bricolage Grotesque",serif;font-size:25px;font-weight:700;box-shadow:0 8px 22px rgba(123,92,255,.4)}
  .lockcard h1{font-family:"Bricolage Grotesque",serif;font-size:28px;margin:0;font-weight:600}
  .lockcard .tag{color:var(--muted);font-size:13px;margin:2px 0 20px}
  .lockcard .seg{display:flex;width:100%;margin-bottom:18px;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .lockcard .seg button{flex:1;border:none;background:#fff;padding:10px;font-size:13.5px;font-weight:600;color:#5a6172;cursor:pointer;font-family:inherit;border-left:1px solid var(--line)}
  .lockcard .seg button:first-child{border-left:none}
  .lockcard .seg button.on{background:var(--accent);color:#fff}
  .lockcard label{display:block;font-size:12px;font-weight:600;color:#5a6172;margin:0 0 5px}
  .lockcard input{width:100%;height:44px;border:1.5px solid var(--line);border-radius:11px;padding:0 14px;font-size:14px;
    font-family:inherit;outline:none;background:#fff;margin-bottom:13px}
  .lockcard input:focus{border-color:var(--accent)}
  .lockcard .go{width:100%;height:46px;border:none;border-radius:12px;background:var(--accent);color:#fff;
    font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px}
  .lockcard .go:hover{background:#e25d40}
  .lockcard .err{color:#c0432a;font-size:12.5px;min-height:16px;margin:2px 0 4px}
  .lockcard .note{font-size:11px;color:var(--muted);line-height:1.5;margin-top:16px;text-align:center}

  /* history page */
  .history{max-width:760px;margin:0 auto;padding:36px 28px 60px}
  .history .htop{display:flex;align-items:center;margin-bottom:8px}

<script>
/* ======================================================================
   Storage layer.
   KV  — low-level key/value over window.storage with in-memory fallback.
   Accounts / Session — local profiles + a soft lock (NOT real security:
     passwords are salted+hashed and kept on this device only).
   Store / History — per-profile saved sites and browsing history.
   ====================================================================== */
const KV = (() => {
  const has = typeof window !== "undefined" && window.storage && window.storage.get;
  const mem = {};
  const mk = (key, shared) => (shared ? "shared::" : "") + key;
  return {
    has,
    async get(key, shared=false){
      const k = mk(key, shared);
      if (has){ try { const r = await window.storage.get(key, shared); return r ? r.value : (mem[k] ?? null); }
                catch(e){ return mem[k] ?? null; } }
      return mem[k] ?? null;
    },
    async set(key, val, shared=false){
      mem[mk(key, shared)] = val;
      if (has){ try { await window.storage.set(key, val, shared); } catch(e){} }
    }
  };
})();

function randHex(n){ const a=new Uint8Array(n); crypto.getRandomValues(a); return [...a].map(x=>x.toString(16).padStart(2,"0")).join(""); }
async function hashPass(pass, salt){
  const msg = salt + "::" + pass;
  if (crypto.subtle){
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(msg));
    return [...new Uint8Array(buf)].map(x=>x.toString(16).padStart(2,"0")).join("");
  }
  let h=2166136261; for(let i=0;i<msg.length;i++){ h^=msg.charCodeAt(i); h=Math.imul(h,16777619); }  // fallback
  return (h>>>0).toString(16);
}

/* People register just a name (shared storage, so the People list works
   across devices). No passwords — a name is only a display label. */
const Accounts = (() => {
  const KEY = "burrow_accounts";
  const all  = async () => { const r = await KV.get(KEY, true); return r ? JSON.parse(r) : {}; };
  const save = async (m) => KV.set(KEY, JSON.stringify(m), true);
  return {
    all, save,
    async count(){ return Object.keys(await all()).length; },
    async register(name){
      const m = await all(); const id = name.toLowerCase();
      if (!m[id]){ m[id] = { username:name, created:Date.now() }; await save(m); }
      return m[id];
    }
  };
})();

/* Which profile is signed in on THIS device — stays personal/per-device. */
const Session = {
  async get(){ const v = await KV.get("burrow_current"); return v || null; },
  async set(u){ await KV.set("burrow_current", u); },
  async clear(){ await KV.set("burrow_current", ""); }
};

/* Saved sites — shared, keyed by lowercased username, so they follow you across devices. */
const Store = (() => {
  let user = null, cache = null;
  const keyFor = () => "burrow_sites__" + user;
  async function ensure(){
    if (cache) return cache;
    const raw = await KV.get(keyFor(), true);
    cache = raw ? JSON.parse(raw) : {};
    return cache;
  }
  async function persist(){ await KV.set(keyFor(), JSON.stringify(cache), true); }
  return {
    persistent: KV.has,
    setUser(u){ user = u; cache = null; },
    async all(){ const c = await ensure(); return Object.values(c).sort((a,b)=>b.updated-a.updated); },
    async get(slug){ const c = await ensure(); return c[slug] || null; },
    async save(site){ const c = await ensure(); c[site.slug] = site; await persist(); return site; },
    async remove(slug){ const c = await ensure(); delete c[slug]; await persist(); }
  };
})();

/* Browsing history — shared, keyed by username, so it follows you across devices. */
const History = (() => {
  let user = null;
  const keyFor = () => "burrow_history__" + user;
  return {
    setUser(u){ user = u; },
    async all(){ const r = await KV.get(keyFor(), true); return r ? JSON.parse(r) : []; },
    async add(entry){
      const list = await History.all();
      if (list[0] && list[0].url === entry.url){ list[0].time = entry.time; }
      else list.unshift(entry);
      if (list.length > 500) list.length = 500;
      await KV.set(keyFor(), JSON.stringify(list), true);
    },
    async clear(){ await KV.set(keyFor(), JSON.stringify([]), true); }
  };
})();

/* One-time bridge: copy anything saved under the OLD per-device (personal) keys
   up into the new SHARED keys, so existing accounts/sites/history keep working
   and become visible on other devices. Safe to run repeatedly. */
async function migrateLegacy(){
  // accounts: merge personal -> shared without overwriting shared entries
  const sharedAcc = JSON.parse((await KV.get("burrow_accounts", true)) || "{}");
  const persAcc   = JSON.parse((await KV.get("burrow_accounts", false)) || "{}");
  let accChanged = false;
  for (const id in persAcc){ if (!sharedAcc[id]){ sharedAcc[id] = persAcc[id]; accChanged = true; } }
  if (accChanged) await KV.set("burrow_accounts", JSON.stringify(sharedAcc), true);

  // also adopt sites made before profiles existed (the very first global key)
  // attach them to the first known account if that account has none yet
  const firstId = Object.keys(sharedAcc)[0];
  if (firstId){
    const legacyGlobal = await KV.get("burrow_sites", false);
    const firstSites = await KV.get("burrow_sites__"+firstId, true);
    if (legacyGlobal && firstSites == null) await KV.set("burrow_sites__"+firstId, legacyGlobal, true);
  }

  // per-user sites & history: personal (by id OR original-case username) -> shared
  for (const id in sharedAcc){
    const uname = sharedAcc[id].username || id;
    for (const kind of ["sites","history"]){
      const newKey = "burrow_"+kind+"__"+id;
      if (await KV.get(newKey, true) != null) continue;        // already have shared copy
      const fromId   = await KV.get(newKey, false);
      const fromName = await KV.get("burrow_"+kind+"__"+uname, false);
      const data = fromId != null ? fromId : fromName;
      if (data != null) await KV.set(newKey, data, true);
    }
  }
}

/* ======================================================================
   Chat — real cross-device rooms over a free public relay (ntfy.sh).
   A room's relay topic is a hash of (room name + password), so without the
   password you can't even compute the topic. Private-by-obscurity, NOT
   encrypted: messages pass through a public server, so no real secrets.
   ====================================================================== */
const Chat = (() => {
  const base = "https://ntfy.sh/";
  async function go(url, opts={}, ms=8000){
    const c = new AbortController(); const t = setTimeout(()=>c.abort(), ms);
    try { return await fetch(url, { ...opts, signal:c.signal }); }
    finally { clearTimeout(t); }
  }
  return {
    async topicFor(room, pass){
      const h = await hashPass(room.trim().toLowerCase(), "burrowchat_v1::" + (pass||""));
      return "brw" + h.slice(0, 26);   // hex -> valid ntfy topic chars
    },
    async ping(){   // quick reachability test of the relay
      try { const r = await go(base+"brwhealthcheck/json?poll=1&since=5s", {}, 6000); return r.ok; }
      catch(e){ return false; }
    },
    async send(topic, obj){
      try { const r = await go(base+topic, { method:"POST", body: JSON.stringify(obj) }); return r.ok; }  // text/plain -> no CORS preflight
      catch(e){ return false; }
    },
    async poll(topic, since){
      const r = await go(base+topic+"/json?poll=1&since=" + encodeURIComponent(since));
      if (!r.ok) throw new Error("ntfy " + r.status);
      const text = await r.text(); const out = [];
      for (const line of text.split("\n")){ const s=line.trim(); if(!s) continue;
        try { const ev = JSON.parse(s); if (ev.event === "message") out.push(ev); } catch(e){} }
      return out;
    }
  };
})();

/* Rooms you've joined — kept on THIS device (the topic is effectively the
   room key, so we don't put it in shared storage). */
const Rooms = {
  key(){ return "burrow_rooms__" + (currentUser||"_").toLowerCase(); },
  async all(){ const r = await KV.get(Rooms.key(), false); return r ? JSON.parse(r) : []; },
  async add(room){
    const list = await Rooms.all();
    if (!list.find(x=>x.topic===room.topic)){ list.unshift(room); if(list.length>30) list.length=30; await KV.set(Rooms.key(), JSON.stringify(list), false); }
  },
  async remove(topic){
    const list = (await Rooms.all()).filter(x=>x.topic!==topic);
    await KV.set(Rooms.key(), JSON.stringify(list), false);
  }
};

/* ======================================================================
   Helpers
   ====================================================================== */
const $ = (s, r=document) => r.querySelector(s);
const stage = $("#stage");
const FAV_COLORS = ["#ef6f53","#41a784","#e0a82e","#6c8ae4","#b167c4","#d9637f","#3fae9a","#e08a3c"];
const colorFor = (str) => { let h=0; for(const ch of String(str)) h=(h*31+ch.charCodeAt(0))>>>0; return FAV_COLORS[h%FAV_COLORS.length]; };
const slugify = (s) => s.toLowerCase().trim().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"") || "site";

function looksLikeUrl(s){
  if (/\s/.test(s)) return false;
  return /^[\w-]+(\.[\w-]+)+(:\d+)?(\/.*)?$/.test(s);   // has a dot, no spaces
}
function parseInput(raw){
  const s = raw.trim();
  if (!s) return "home://";
  if (/^(home|create|mine|search|https?):\/\//.test(s)) return s;
  if (looksLikeUrl(s)) return "https://" + s;
  // bare words -> Juju's own search results page
  return "search://" + encodeURIComponent(s);
}
function schemeOf(url){
  if (url.startsWith("home://"))   return "home";
  if (url.startsWith("create://")) return "create";
  if (url.startsWith("mine://"))   return "mine";
  if (url.startsWith("search://")) return "search";
  if (url.startsWith("history://")) return "history";
  if (url.startsWith("people://")) return "people";
  if (url.startsWith("chat://")) return "chat";
  return "web";
}

/* ======================================================================
   Tab model.  Each tab keeps its own history stack + index.
   ====================================================================== */
let tabs = [];
let activeId = null;
let nextId = 1;

const activeTab = () => tabs.find(t => t.id === activeId);
const curUrl = (t) => t.history[t.idx];

function newTab(url="home://", { activate=true } = {}){
  const t = { id: nextId++, history:[url], idx:0, title:"New Tab" };
  tabs.push(t);
  if (activate) activeId = t.id;
  renderTabs();
  if (activate) renderStage();
  return t;
}
function closeTab(id){
  const i = tabs.findIndex(t=>t.id===id);
  if (i<0) return;
  tabs.splice(i,1);
  if (tabs.length===0){ newTab("home://"); return; }
  if (activeId===id){ activeId = tabs[Math.min(i, tabs.length-1)].id; renderStage(); }
  renderTabs();
}
function switchTab(id){ activeId=id; renderTabs(); renderStage(); }

function navigate(url, { replace=false } = {}){
  const t = activeTab(); if(!t) return;
  if (replace){ t.history[t.idx] = url; }
  else {
    t.history = t.history.slice(0, t.idx+1);
    if (t.history[t.idx] !== url){ t.history.push(url); t.idx++; }
  }
  renderStage();
}
function goBack(){ const t=activeTab(); if(t&&t.idx>0){ t.idx--; renderStage(); } }
function goFwd(){ const t=activeTab(); if(t&&t.idx<t.history.length-1){ t.idx++; renderStage(); } }
function reload(){ renderStage(); }

/* ======================================================================
   Render: tab strip
   ====================================================================== */
function renderTabs(){
  const strip = $("#tabstrip");
  strip.innerHTML = "";
  for (const t of tabs){
    const el = document.createElement("div");
    el.className = "tab" + (t.id===activeId ? " active":"");
    el.onclick = (e)=>{ if(!e.target.closest(".x")) switchTab(t.id); };
    const letter = (t.title||"N").trim()[0]?.toUpperCase() || "N";
    el.innerHTML =
      `<div class="fav" style="background:${colorFor(t.title)}">${letter}</div>
       <div class="label">${escapeHtml(t.title)}</div>
       <div class="x" title="Close tab">×</div>`;
    el.querySelector(".x").onclick = (e)=>{ e.stopPropagation(); closeTab(t.id); };
    strip.appendChild(el);
  }
  const add = document.createElement("button");
  add.className="newtab"; add.textContent="+"; add.title="New tab";
  add.onclick = ()=> newTab("home://");
  strip.appendChild(add);
}

/* ======================================================================
   Render: address bar + nav state
   ====================================================================== */
function renderChrome(url){
  const t = activeTab();
  $("#back").disabled = !(t && t.idx>0);
  $("#fwd").disabled  = !(t && t.idx < t.history.length-1);

  const kind = schemeOf(url);
  const schemeEl = $("#scheme");
  const urlInput = $("#url");
  const extBtn = $("#extbtn");
  const editBtn = $("#editbtn");
  extBtn.style.display = "none";
  editBtn.style.display = "none";

  if (kind==="home"){
    schemeEl.textContent="home"; schemeEl.className="scheme home";
    urlInput.value=""; urlInput.placeholder="Search, type a site name, or paste a link…";
  } else if (kind==="create"){
    schemeEl.textContent="build"; schemeEl.className="scheme mine";
    urlInput.value = url;
  } else if (kind==="mine"){
    schemeEl.textContent="mine"; schemeEl.className="scheme mine";
    urlInput.value = url;
    editBtn.style.display="inline-flex";
  } else if (kind==="search"){
    schemeEl.textContent="search"; schemeEl.className="scheme";
    urlInput.value = decodeURIComponent(url.slice("search://".length));
    extBtn.style.display="inline-flex";
  } else if (kind==="history"){
    schemeEl.textContent="history"; schemeEl.className="scheme home";
    urlInput.value=""; urlInput.placeholder="Search, type a site name, or paste a link…";
  } else if (kind==="people"){
    schemeEl.textContent="people"; schemeEl.className="scheme home";
    urlInput.value=""; urlInput.placeholder="Search, type a site name, or paste a link…";
  } else if (kind==="chat"){
    schemeEl.textContent="chat"; schemeEl.className="scheme mine";
    urlInput.value=""; urlInput.placeholder="Search, type a site name, or paste a link…";
  } else {
    schemeEl.textContent = url.startsWith("https")?"https":"http";
    schemeEl.className="scheme";
    urlInput.value = url;
    extBtn.style.display="inline-flex";
  }
}

/* ======================================================================
   Render: the stage (page content) for the active tab's current url
   ====================================================================== */
async function renderStage(){
  const t = activeTab(); if(!t) return;
  const url = curUrl(t);
  if (peopleTimer){ clearInterval(peopleTimer); peopleTimer = null; }  // stop live refresh unless re-armed
  if (chatTimer){ clearInterval(chatTimer); chatTimer = null; }
  renderChrome(url);
  const kind = schemeOf(url);

  if      (kind==="home")   await renderHome();
  else if (kind==="create") await renderEditor(url);
  else if (kind==="mine")   await renderMine(url);
  else if (kind==="search") await renderSearch(url);
  else if (kind==="history") await renderHistory();
  else if (kind==="people") await renderPeople(url);
  else if (kind==="chat")   await renderChat();
  else                      renderWeb(url);

  // record to history (real pages, your sites, and searches) — never in incognito
  if (!incognito && (kind==="mine" || kind==="web" || kind==="search")){
    History.add({ url, title: activeTab()?.title || url, time: Date.now(), kind });
  }

  renderTabs(); // titles may have changed
}

function setTitle(title){
  const t = activeTab(); if(t){ t.title = title; }
}

/* ---------- HOME / new-tab page ---------- */
async function renderHome(){
  setTitle("New Tab");
  const sites = await Store.all();
  const quick = [
    ["Wikipedia","https://www.wikipedia.org"],
    ["MDN Web Docs","https://developer.mozilla.org"],
    ["example.com","https://example.com"],
    ["Hacker News","https://news.ycombinator.com"],
  ];
  stage.innerHTML = `
    <div class="scroll"><div class="home">
      <div class="brand">
        <div class="logo">J</div>
        <div>
          <h1>juju</h1>
          <p>Your own little web — conjure sites, save them, and revisit your own corner anytime.</p>
        </div>
      </div>

      <div class="homebar">
        <input id="homeq" spellcheck="false" placeholder="Search the web, type a site name, or paste a link…" />
        <button class="btn primary" id="homego">Go</button>
      </div>

      <div class="sectlabel">Your sites${Store.persistent?"":" · session only"}</div>
      <div class="grid" id="sitegrid"></div>

      <div class="sectlabel" style="margin-top:38px">Jump to the real web</div>
      <div class="quick" id="quickrow"></div>

      <p class="hint">
        Type anything that isn't a link and Juju runs the search itself, right here — no redirect.
        Build a page with <strong>New site</strong> and it saves to <code>mine://your-name</code>,
        sticking around between sessions. Real links open in-frame when the site allows it; if it doesn't,
        hit <strong>Open for real</strong> to pop it into a normal tab.
      </p>
    </div></div>`;

  // sites grid
  const grid = $("#sitegrid");
  const newCard = document.createElement("div");
  newCard.className="card new";
  newCard.innerHTML = `<div class="plus">＋</div><span>Create a new site</span>`;
  newCard.onclick = ()=> navigate("create://");
  grid.appendChild(newCard);

  for (const s of sites){
    const card = document.createElement("div");
    card.className="card";
    card.onclick = (e)=>{ if(!e.target.closest(".acts")) navigate("mine://"+s.slug); };
    const letter = (s.name||"S").trim()[0]?.toUpperCase()||"S";
    card.innerHTML = `
      <div class="fav" style="background:${colorFor(s.name)}">${letter}</div>
      <h3>${escapeHtml(s.name)}</h3>
      <div class="sub">mine://${s.slug}</div>
      <div class="acts">
        <button data-act="edit">Edit</button>
        <button data-act="del" class="del">Delete</button>

    card.querySelector('[data-act="edit"]').onclick = (e)=>{ e.stopPropagation(); navigate("create://"+s.slug); };

      e.stopPropagation();
      if (confirm(`Delete “${s.name}”? This can't be undone.`)){ await Store.remove(s.slug); renderHome(); }
    };
    grid.appendChild(card);
  }

  // quick links
  const qr = $("#quickrow");
  for (const [name,href] of quick){
    const c = document.createElement("button");
    c.className="chip"; c.textContent=name;
    c.onclick = ()=> navigate(href);
    qr.appendChild(c);
  }

  // home search
  const submit = ()=>{ const v=$("#homeq").value; if(v.trim()) navigate(parseInput(v)); };
  $("#homego").onclick = submit;
  $("#homeq").addEventListener("keydown", e=>{ if(e.key==="Enter") submit(); });
}

/* ---------- HISTORY page ---------- */
async function renderHistory(){
  setTitle("History");
  const items = await History.all();
  stage.innerHTML = `
    <div class="scroll"><div class="history">
      <div class="htop"><h1>History</h1>${items.length?`<button class="clr" id="clrhist">Clear history</button>`:""}</div>
      <div id="hlist"></div>
    </div></div>`;

  const list = $("#hlist");
  if (!items.length){
    list.innerHTML = `<div class="empty">Nothing here yet. Pages you visit show up here — except in incognito.</div>`;
    return;
  }
  const dayLabel = (ts)=>{
    const d=new Date(ts), now=new Date();
    const same=(a,b)=>a.toDateString()===b.toDateString();
    const yest=new Date(now); yest.setDate(now.getDate()-1);
    if(same(d,now)) return "Today";
    if(same(d,yest)) return "Yesterday";
    return d.toLocaleDateString(undefined,{weekday:"long",month:"short",day:"numeric"});
  };
  let curDay=null;
  for (const it of items){
    const dl=dayLabel(it.time);
    if(dl!==curDay){ curDay=dl; list.appendChild(el("div","day",dl)); }
    let host=it.url; try{ if(/^https?:/.test(it.url)) host=new URL(it.url).hostname.replace(/^www\./,"");
      else if(it.url.startsWith("mine://")) host=it.url; else if(it.url.startsWith("search://")) host="search"; }catch(e){}
    const time=new Date(it.time).toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"});
    const letter=(it.title||"?").trim()[0]?.toUpperCase()||"?";
    const row=el("div","hitem",
      `<span class="t">${time}</span>
       <span class="ic" style="background:${colorFor(it.title||it.url)}">${letter}</span>
       <span class="tt">${escapeHtml(it.title||it.url)}</span>
       <span class="hh">${escapeHtml(host)}</span>`);
    row.onclick=()=> navigate(it.kind==="search" ? it.url : it.url);
    list.appendChild(row);
  }
  const clr=$("#clrhist");
  if(clr) clr.onclick=async ()=>{ if(confirm("Clear your whole history?")){ await History.clear(); renderHistory(); } };
}

/* ---------- PEOPLE: shared roster of everyone who made an account ---------- */
let peopleTimer = null;
let peopleSig = "";

async function renderPeople(url){
  setTitle("People");
  stage.innerHTML = `
    <div class="scroll"><div class="history people">
      <div class="htop"><h1>People on Juju</h1><span class="livedot" title="Live">● live</span></div>
      <p class="psub" id="pcount">Loading…</p>
      <div id="plist"></div>
      <p class="note pnote">This list is shared across everyone — and every device — using this Juju browser. It shows names and join dates only.</p>
    </div></div>`;

  async function paintList(){
    const accs = await Accounts.all();
    const people = Object.values(accs)
      .map(a => ({ username:a.username, created:a.created }))   // never expose salt/hash
      .sort((a,b)=> b.created - a.created);
    if (curUrl(activeTab()) !== url) return;     // navigated away
    const sig = people.map(p=>p.username).join("|");
    if (sig === peopleSig && $("#plist").children.length) return;  // no change
    peopleSig = sig;

    $("#pcount").textContent = people.length === 1 ? "1 person here" : `${people.length} people here`;
    const list = $("#plist"); list.innerHTML = "";
    if (!people.length){ list.innerHTML = `<div class="empty">No accounts yet — be the first!</div>`; return; }

    for (const p of people){
      const when = new Date(p.created).toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"});
      const me = currentUser && p.username.toLowerCase()===currentUser.toLowerCase();
      const letter = (p.username||"?").trim()[0]?.toUpperCase()||"?";
      const row = el("div","pitem"+(me?" me":""),
        `<span class="ic" style="background:${colorFor(p.username)}">${letter}</span>
         <span class="nm">${escapeHtml(p.username)}${me?` <em>(you)</em>`:""}</span>
         <span class="jn">joined ${when}</span>`);
      list.appendChild(row);
    }
  }

  peopleSig = "";
  await paintList();
  // keep it fresh: re-check the shared list every few seconds while this page is open
  peopleTimer = setInterval(()=>{
    if (curUrl(activeTab()) !== url){ clearInterval(peopleTimer); peopleTimer=null; return; }
    paintList();
  }, 4000);
}

/* ---------- CHAT: rooms + live messages ---------- */
let chatTimer = null;
let chatRoom = null;   // { room, hasPass, topic }

async function renderChat(){
  setTitle(chatRoom ? "Chat · " + chatRoom.room : "Chat");
  if (chatRoom) await renderRoom();
  else await renderLobby();
}

async function renderLobby(){
  stage.innerHTML = `
    <div class="scroll"><div class="chatlobby">
      <div class="brand"><div class="logo" style="background:var(--mine);box-shadow:0 6px 18px rgba(19,184,166,.34)">💬</div>
        <div><h1>Chat rooms</h1><p>Make a room, share its name (and password) with friends, and chat across any device.</p></div></div>
      <div class="newroom">
        <input id="rn" placeholder="Room name (e.g. family-chat)" autocomplete="off" maxlength="40" />
        <input id="rp" type="password" placeholder="Password — optional" maxlength="40" />
        <button class="btn primary" id="ropen">Open room</button>
      </div>
      <div class="sectlabel">Rooms you've joined</div>
      <div id="roomlist"></div>
      <div class="relaystatus" id="relaystatus">Checking the chat relay…</div>
      <p class="hint">Messages travel through a free public relay (ntfy.sh), which is how they reach other devices. A password just makes the room's address unguessable — it's private-by-obscurity, <strong>not encrypted</strong>. Don't share real secrets. Rooms with no password can be joined by anyone who knows the name.</p>
    </div></div>`;

  Chat.ping().then(ok=>{
    const s = $("#relaystatus"); if(!s) return;
    if (ok){ s.className="relaystatus ok"; s.textContent="✓ Connected to the chat relay — rooms will sync across devices."; }
    else { s.className="relaystatus bad"; s.innerHTML="⚠ Can't reach the chat relay from this preview window. Chat works when you <strong>download this file and open it in a normal browser</strong> (Safari, Chrome, etc.)."; }
  });

  const open = async ()=>{
    const room = $("#rn").value.trim();
    if (!room){ $("#rn").focus(); return; }
    const pass = $("#rp").value;
    const topic = await Chat.topicFor(room, pass);
    chatRoom = { room, hasPass: !!pass, topic };
    await Rooms.add(chatRoom);
    renderChat();
  };
  $("#ropen").onclick = open;
  $("#rn").addEventListener("keydown", e=>{ if(e.key==="Enter") open(); });
  $("#rp").addEventListener("keydown", e=>{ if(e.key==="Enter") open(); });

  const rl = $("#roomlist");
  const rooms = await Rooms.all();
  if (!rooms.length){ rl.innerHTML = `<div class="empty">No rooms yet — make one above.</div>`; return; }
  for (const rm of rooms){
    const d = el("div","roomcard");
    const letter = (rm.room||"#").trim()[0]?.toUpperCase()||"#";
    d.innerHTML = `<div class="ic" style="background:${colorFor(rm.room)}">${letter}</div>
                   <b>${escapeHtml(rm.room)}</b>${rm.hasPass?'<span class="lk">🔒</span>':''}
                   <button class="x" title="Forget room">✕</button>`;
    d.onclick = (e)=>{ if(e.target.closest(".x")) return; chatRoom = {room:rm.room, hasPass:rm.hasPass, topic:rm.topic}; renderChat(); };
    d.querySelector(".x").onclick = async (e)=>{ e.stopPropagation(); await Rooms.remove(rm.topic); renderLobby(); };
    rl.appendChild(d);
  }
}

async function renderRoom(){
  const room = chatRoom;
  const me = currentUser || "me";
  stage.innerHTML = `
    <div class="chatroom">
      <div class="chathead">
        <button class="cback" id="cback">‹ Rooms</button>
        <div class="ti"><b>${escapeHtml(room.room)}</b>${room.hasPass?' 🔒':''}</div>
        <span class="clive" id="clive">connecting…</span>
      </div>
      <div class="msgs" id="msgs"><div class="loadingmsg">Loading messages…</div></div>
      <div class="composer">
        <input id="cmsg" placeholder="Message…" autocomplete="off" maxlength="500" />
        <button class="btn primary" id="csend">Send</button>
      </div>
    </div>`;

  $("#cback").onclick = ()=>{ chatRoom = null; if(chatTimer){ clearInterval(chatTimer); chatTimer=null; } renderChat(); };

  const msgs = $("#msgs");
  const seen = new Set();
  const mineSigs = new Set();
  let sinceTs = Math.floor(Date.now()/1000) - 6*3600;   // 6h of history, then track by timestamp
  let fails = 0;

  const sigOf = (u,t,ts)=> (u||"")+"|"+t+"|"+ts;
  function addMsg(u,t,ts,mine){
    const lm = msgs.querySelector(".loadingmsg"); if(lm) lm.remove();
    const wrap = el("div","msg"+(mine?" mine":""));
    const letter = (u||"?").trim()[0]?.toUpperCase()||"?";
    const tm = new Date(ts).toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"});
    wrap.innerHTML = `<div class="av" style="background:${colorFor(u)}">${letter}</div>
      <div class="bub"><div class="who">${escapeHtml(u)} <span class="tm">${tm}</span></div>
      <div class="tx">${escapeHtml(t)}</div></div>`;
    msgs.appendChild(wrap);
  }
  function parseEv(ev){
    let o; try{ o = JSON.parse(ev.message); }catch(e){ o = null; }
    if (o && typeof o==="object") return { u:o.u||"?", t:(o.t!=null?String(o.t):ev.message), ts:o.ts||(ev.time*1000) };
    return { u:"?", t:ev.message, ts:(ev.time||0)*1000 };
  }

  async function tick(first){
    let evs;
    try { evs = await Chat.poll(room.topic, sinceTs); fails = 0; }
    catch(e){
      if (chatRoom !== room) return;
      fails++;
      const l=$("#clive"); if(l) l.textContent = fails>=2 ? "relay blocked here" : "reconnecting…";
      if ((first || fails>=2) && !msgs.querySelector(".msg")){
        msgs.innerHTML = `<div class="loadingmsg">Can't reach the chat relay from this preview.<br>Download this file and open it in a normal browser, and chat will work.</div>`;
      }
      return;
    }
    if (chatRoom !== room) return;     // left the room
    if (first && !msgs.querySelector(".msg")) msgs.innerHTML = "";
    let added = false, maxT = sinceTs;
    for (const ev of evs){
      if (seen.has(ev.id)) continue; seen.add(ev.id);
      if (ev.time && ev.time > maxT) maxT = ev.time;
      const m = parseEv(ev);
      const sig = sigOf(m.u, m.t, m.ts);
      if (mineSigs.has(sig)){ mineSigs.delete(sig); continue; }   // already shown optimistically
      addMsg(m.u, m.t, m.ts, (m.u||"").toLowerCase()===me.toLowerCase());
      added = true;
    }
    sinceTs = maxT - 5;   // small overlap; seen-set prevents duplicates
    if (first && !msgs.querySelector(".msg")) msgs.innerHTML = `<div class="loadingmsg">No messages yet — say hi!</div>`;
    if (added) msgs.scrollTop = msgs.scrollHeight;
    const l=$("#clive"); if(l) l.textContent = "live";
  }

  await tick(true);
  chatTimer = setInterval(()=>{ if(chatRoom!==room){ clearInterval(chatTimer); chatTimer=null; return; } tick(false); }, 2500);

  const send = async ()=>{
    const inp = $("#cmsg"); const t = inp.value.trim(); if(!t) return;
    inp.value = "";
    const ts = Date.now();
    mineSigs.add(sigOf(me, t, ts));
    addMsg(me, t, ts, true); msgs.scrollTop = msgs.scrollHeight;   // optimistic
    const ok = await Chat.send(room.topic, { u:me, t, ts });
    const l=$("#clive"); if(l) l.textContent = ok ? "live" : "couldn't send — check connection";
  };
  $("#csend").onclick = send;
  $("#cmsg").addEventListener("keydown", e=>{ if(e.key==="Enter") send(); });
  $("#cmsg").focus();
}

/* ---------- MINE: render a saved site ---------- */
async function renderMine(url){
  const slug = url.slice("mine://".length);
  const site = await Store.get(slug);
  if (!site){
    setTitle("Not found");
    stage.innerHTML = `
      <div class="notfound">
        <div class="ic">🕳️</div>
        <h2>No site at mine://${escapeHtml(slug)}</h2>
        <p>Nothing's saved here yet.</p>
        <button class="btn mine" id="mk">＋ Build it</button>
      </div>`;
    $("#mk").onclick = ()=> navigate("create://"+slug, {replace:true});
    return;
  }
  setTitle(site.name);
  stage.innerHTML = "";
  const f = document.createElement("iframe");
  f.className="frame";
  f.setAttribute("sandbox","allow-scripts allow-forms allow-popups allow-modals");
  f.srcdoc = site.html;
  stage.appendChild(f);
}

/* ======================================================================
   CREATE: the site builder.  Two modes:
     • build  — a no-code block builder (the easy, default path)
     • code   — the raw HTML/CSS/JS editor (the "I have the code" path)
   Block sites store {blocks, theme, html}; code sites store {html} only.
   ====================================================================== */
const el = (tag, cls, html) => { const n=document.createElement(tag); if(cls)n.className=cls; if(html!=null)n.innerHTML=html; return n; };
const bid = () => "b"+Math.random().toString(36).slice(2,8);

function fontStack(f){
  if (f==="serif") return "Georgia, 'Times New Roman', serif";
  if (f==="play")  return "'Comic Sans MS', 'Chalkboard SE', 'Trebuchet MS', sans-serif";
  if (f==="mono")  return "'Space Mono', ui-monospace, monospace";
  return "system-ui, -apple-system, 'Segoe UI', sans-serif";
}
const BLOCKS = [
  ["hero","🏔️","Banner"], ["heading","🔠","Heading"], ["text","📝","Text"],
  ["button","🔘","Button"], ["image","🖼️","Picture"], ["card","🗂️","Card"],
  ["divider","➖","Divider"], ["spacer","↕️","Space"],
];
function defaultBlock(type){
  const base = {id:bid(), type};
  const d = {
    hero:    {title:"Big title", subtitle:"A little subtitle", bg:"#41a784", color:"#ffffff"},
    heading: {text:"A heading", size:"m", align:"left"},
    text:    {text:"Some words go here. Type whatever you like!", align:"left"},
    button:  {label:"Click me", link:"https://", color:"#ef6f53", align:"left"},
    image:   {url:"https://picsum.photos/600/320", alt:"", rounded:true},
    card:    {title:"Card title", body:"A box with a title and some text.", bg:"#ffffff"},
    divider: {},
    spacer:  {size:"m"},
  }[type] || {};
  return Object.assign(base, d);
}
function starterBlocks(){
  return [
    Object.assign({id:bid(),type:"hero"},   {title:"My Awesome Page", subtitle:"Made with Juju", bg:"#41a784", color:"#ffffff"}),
    Object.assign({id:bid(),type:"text"},   {text:"Welcome! Change these blocks on the left and watch the preview update. Add more with the buttons at the bottom.", align:"left"}),
    Object.assign({id:bid(),type:"button"}, {label:"Click me", link:"https://example.com", color:"#ef6f53", align:"left"}),
  ];
}

function blockHtml(b, theme){
  const e = escapeHtml;
  switch(b.type){
    case "hero":
      return `<section style="background:${b.bg};color:${b.color};padding:56px 24px;border-radius:16px;text-align:center;margin:0 0 18px">
        <h1 style="margin:0 0 8px;font-size:34px;line-height:1.15">${e(b.title)}</h1>
        ${b.subtitle?`<p style="margin:0;opacity:.9;font-size:17px">${e(b.subtitle)}</p>`:""}</section>`;
    case "heading": {
      const sz={s:20,m:27,l:35}[b.size||"m"];
      return `<h2 style="text-align:${b.align||'left'};font-size:${sz}px;margin:20px 0 8px;line-height:1.2">${e(b.text)}</h2>`;
    }
    case "text":
      return `<p style="text-align:${b.align||'left'};line-height:1.65;margin:0 0 14px;font-size:16px">${e(b.text).replace(/\n/g,"<br>")}</p>`;
    case "button": {
      const href=e(b.link||"#"); const ext=/^https?:/i.test(b.link||"");
      return `<div style="text-align:${b.align||'left'};margin:8px 0 16px">
        <a href="${href}" ${ext?'target="_blank" rel="noopener"':''} style="display:inline-block;background:${b.color||theme.accent};color:#fff;text-decoration:none;padding:13px 24px;border-radius:11px;font-weight:600;font-size:15px">${e(b.label||"Button")}</a></div>`;
    }
    case "image":
      return b.url ? `<img src="${e(b.url)}" alt="${e(b.alt||'')}" style="max-width:100%;display:block;margin:0 auto 16px;border-radius:${b.rounded?16:4}px" />` : "";
    case "card":
      return `<div style="background:${b.bg||'#ffffff'};border:1px solid rgba(0,0,0,.09);border-radius:14px;padding:18px 20px;margin:0 0 16px">
        <h3 style="margin:0 0 6px;font-size:19px">${e(b.title)}</h3>
        <p style="margin:0;line-height:1.55;opacity:.85">${e(b.body).replace(/\n/g,"<br>")}</p></div>`;
    case "divider":
      return `<hr style="border:none;border-top:1px solid rgba(0,0,0,.13);margin:20px 0" />`;
    case "spacer": {
      const h={s:16,m:38,l:74}[b.size||"m"];
      return `<div style="height:${h}px"></div>`;
    }
    default: return "";
  }
}
function blocksToHtml(name, theme, blocks){
  const body = blocks.map(b=>blockHtml(b,theme)).join("\n");
  return `<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${escapeHtml(name||"My site")}</title></head>
<body style="margin:0;background:${theme.bg};font-family:${fontStack(theme.font)};color:#222">
  <main style="max-width:680px;margin:0 auto;padding:32px 20px 64px">
${body}
  </main>
</body></html>`;
}

async function renderEditor(url){
  const slug = url.startsWith("create://") ? url.slice("create://".length) : "";
  const existing = slug ? await Store.get(slug) : null;
  setTitle(existing ? "Editing "+existing.name : "New site");

  const st = {
    name: existing?.name || "",
    slug: existing?.slug || "",
    created: existing?.created || Date.now(),
    mode: existing ? (existing.blocks ? "build" : "code") : "build",
    hasBlocks: !!(existing?.blocks),
    theme: existing?.theme ? {...existing.theme} : {bg:"#fff7ed", accent:"#41a784", font:"sans"},
    blocks: existing?.blocks ? JSON.parse(JSON.stringify(existing.blocks)) : starterBlocks(),
    code: (existing && !existing.blocks) ? existing.html : "",
  };

  function currentHtml(){ return st.mode==="code" ? st.code : blocksToHtml(st.name, st.theme, st.blocks); }

  function paint(){
    stage.innerHTML = `
      <div class="editor">
        <div class="ehead">
          <div class="mlogo">J</div>
          <input class="name" id="sname" placeholder="Name your site…" value="${escapeHtml(st.name)}" />
          <div class="spacer"></div>
          <button class="btn ghost" id="emode">${st.mode==="build" ? "&lt;/&gt; Code" : "🧱 Blocks"}</button>
          <button class="btn ghost" id="ecancel">Cancel</button>
          <button class="btn mine" id="esave">Save site</button>
        </div>
        <div class="ebody" id="ebody"></div>
      </div>`;

    $("#sname").addEventListener("input", e=>{ st.name = e.target.value; });
    $("#ecancel").onclick = ()=> existing ? navigate("mine://"+existing.slug,{replace:true}) : navigate("home://",{replace:true});
    $("#esave").onclick = save;
    $("#emode").onclick = ()=>{
      if (st.mode==="build"){ st.code = currentHtml(); st.mode="code"; }
      else { st.mode="build"; }   // returning to blocks ignores manual code edits
      paint();
    };

    if (st.mode==="build") paintBuilder();
    else paintCode();
  }

  /* ---- BLOCK BUILDER ---- */
  function paintBuilder(){
    const body = $("#ebody");
    body.innerHTML = `
      <div class="bcol">
        <div class="themecard" id="themecard"></div>
        <div id="blocklist"></div>
        <div class="palette">
          <div class="pt">＋ Add a block</div>
          <div class="palgrid" id="palgrid"></div>
        </div>
      </div>
      <div class="preview">
        <div class="prevtab"><span class="dot"></span> Live preview</div>
        <iframe class="prev" id="sprev" sandbox="allow-scripts allow-forms allow-popups allow-modals"></iframe>
      </div>`;

    // theme controls
    const tc = $("#themecard");
    tc.appendChild(el("div","tt","🎨 Page style"));
    const trow = el("div","row3");
    trow.appendChild(colorField("Background", st.theme.bg, v=>{ st.theme.bg=v; refresh(); }));
    trow.appendChild(colorField("Accent", st.theme.accent, v=>{ st.theme.accent=v; refresh(); }));
    tc.appendChild(trow);
    tc.appendChild(segField("Font", [["sans","Sans"],["serif","Serif"],["play","Playful"],["mono","Mono"]], st.theme.font, v=>{ st.theme.font=v; refresh(); }));

    // block cards
    const list = $("#blocklist");
    st.blocks.forEach((b,i)=> list.appendChild(blockCard(b,i)));

    // palette
    const pg = $("#palgrid");
    for (const [type,icon,label] of BLOCKS){
      const pb = el("button","palbtn",`<span class="pi">${icon}</span>${label}`);
      pb.onclick = ()=>{ st.blocks.push(defaultBlock(type)); paintBuilder(); };
      pg.appendChild(pb);
    }
    refresh();
  }

  function blockCard(b,i){
    const card = el("div","bcard");
    const def = BLOCKS.find(x=>x[0]===b.type) || ["?","▫️",b.type];
    const head = el("div","bcard-head",
      `<span class="ico">${def[1]}</span><span class="nm">${def[2]}</span>`);
    const up = el("button",null,"↑"); up.title="Move up";
    const dn = el("button",null,"↓"); dn.title="Move down";
    const rm = el("button","del","✕"); rm.title="Delete";
    up.onclick=()=>{ if(i>0){ [st.blocks[i-1],st.blocks[i]]=[st.blocks[i],st.blocks[i-1]]; paintBuilder(); } };
    dn.onclick=()=>{ if(i<st.blocks.length-1){ [st.blocks[i+1],st.blocks[i]]=[st.blocks[i],st.blocks[i+1]]; paintBuilder(); } };
    rm.onclick=()=>{ st.blocks.splice(i,1); paintBuilder(); };
    head.append(up,dn,rm);
    card.appendChild(head);

    const set = (k,v)=>{ b[k]=v; refresh(); };
    switch(b.type){
      case "hero":
        card.append(textField("Title", b.title, v=>set("title",v)),
                    textField("Subtitle", b.subtitle, v=>set("subtitle",v)),
                    rowOf(colorField("Banner color", b.bg, v=>set("bg",v)),
                          colorField("Text color", b.color, v=>set("color",v))));
        break;
      case "heading":
        card.append(textField("Words", b.text, v=>set("text",v)),
                    rowOf(segField("Size",[["s","S"],["m","M"],["l","L"]], b.size||"m", v=>set("size",v)),
                          segField("Align",[["left","⬅"],["center","⬌"],["right","➡"]], b.align||"left", v=>set("align",v))));
        break;
      case "text":
        card.append(areaField("Words", b.text, v=>set("text",v)),
                    segField("Align",[["left","⬅"],["center","⬌"],["right","➡"]], b.align||"left", v=>set("align",v)));
        break;
      case "button":
        card.append(textField("Button label", b.label, v=>set("label",v)),
                    textField("Links to (https://…)", b.link, v=>set("link",v)),
                    rowOf(colorField("Color", b.color, v=>set("color",v)),
                          segField("Align",[["left","⬅"],["center","⬌"],["right","➡"]], b.align||"left", v=>set("align",v))));
        break;
      case "image":
        card.append(textField("Picture link (https://…)", b.url, v=>set("url",v)),
                    textField("Description", b.alt, v=>set("alt",v)),
                    checkField("Rounded corners", b.rounded, v=>set("rounded",v)));
        break;
      case "card":
        card.append(textField("Title", b.title, v=>set("title",v)),
                    areaField("Text", b.body, v=>set("body",v)),
                    colorField("Box color", b.bg, v=>set("bg",v)));
        break;
      case "spacer":
        card.append(segField("Height",[["s","Small"],["m","Medium"],["l","Large"]], b.size||"m", v=>set("size",v)));
        break;
      case "divider":
        card.append(el("p","hintline","A thin line across the page."));
        break;
    }
    return card;
  }

  /* ---- CODE EDITOR ---- */
  function paintCode(){
    const body = $("#ebody");
    if (!st.code) st.code = blocksToHtml(st.name, st.theme, st.blocks);
    body.innerHTML = `
      <div class="codepane">
        <div class="codetab">HTML · CSS · JS — your page</div>
        <textarea id="scode" spellcheck="false"></textarea>
      </div>
      <div class="preview">
        <div class="prevtab"><span class="dot"></span> Live preview</div>
        <iframe class="prev" id="sprev" sandbox="allow-scripts allow-forms allow-popups allow-modals"></iframe>
      </div>`;
    const code = $("#scode");
    code.value = st.code;
    let t=null;
    code.addEventListener("input", ()=>{ st.code=code.value; clearTimeout(t); t=setTimeout(refresh,220); });
    code.addEventListener("keydown", e=>{
      if (e.key==="Tab"){ e.preventDefault(); const s=code.selectionStart, en=code.selectionEnd;
        code.value=code.value.slice(0,s)+"  "+code.value.slice(en); code.selectionStart=code.selectionEnd=s+2; st.code=code.value; }
    });
    refresh();
  }

  function refresh(){ const f=$("#sprev"); if(f) f.srcdoc = currentHtml(); }

  async function save(){
    if (!st.name.trim()){ const n=$("#sname"); n.focus(); n.style.borderColor="var(--accent)"; return; }
    const finalSlug = existing ? existing.slug : await uniqueSlug(slugify(st.name));
    const now = Date.now();
    const site = { slug:finalSlug, name:st.name.trim(), html:currentHtml(),
                   created: st.created, updated: now };
    if (st.mode==="build"){ site.blocks = st.blocks; site.theme = st.theme; }
    await Store.save(site);
    navigate("mine://"+finalSlug, {replace:true});
  }

  paint();
}

/* small labeled-field builders for the block editor */
function fieldWrap(label, control){ const w=el("div","field"); if(label){ const l=document.createElement("label"); l.textContent=label; w.appendChild(l);} w.appendChild(control); return w; }
function rowOf(...nodes){ const r=el("div","row3"); nodes.forEach(n=>r.appendChild(n)); return r; }
function textField(label,val,on){ const i=document.createElement("input"); i.type="text"; i.value=val||""; i.addEventListener("input",e=>on(e.target.value)); return fieldWrap(label,i); }
function areaField(label,val,on){ const t=document.createElement("textarea"); t.value=val||""; t.addEventListener("input",e=>on(e.target.value)); return fieldWrap(label,t); }
function colorField(label,val,on){ const w=el("div","field color"); const l=document.createElement("label"); l.textContent=label; const i=document.createElement("input"); i.type="color"; i.value=val||"#000000"; i.addEventListener("input",e=>on(e.target.value)); w.append(l,i); return w; }
function checkField(label,val,on){ const w=el("div","field check"); const i=document.createElement("input"); i.type="checkbox"; i.checked=!!val; i.addEventListener("change",e=>on(e.target.checked)); const l=document.createElement("label"); l.textContent=label; w.append(i,l); return w; }
function segField(label,opts,val,on){
  const seg=el("div","seg");
  opts.forEach(([v,lab])=>{ const b=document.createElement("button"); b.textContent=lab; if(v===val)b.className="on";
    b.onclick=()=>{ on(v); seg.querySelectorAll("button").forEach(x=>x.classList.remove("on")); b.classList.add("on"); }; seg.appendChild(b); });
  return fieldWrap(label,seg);
}
async function uniqueSlug(base){
  let s=base, n=2;
  while (await Store.get(s)){ s = base+"-"+n; n++; }
  return s;
}
async function uniqueSlug(base){
  let s=base, n=2;
  while (await Store.get(s)){ s = base+"-"+n; n++; }
  return s;
}

/* ---------- SEARCH: Juju's own results page ---------- */
const ENGINES = [
  ["Google","https://www.google.com/search?q="],
  ["DuckDuckGo","https://duckduckgo.com/?q="],
  ["Bing","https://www.bing.com/search?q="],
  ["Wikipedia","https://en.wikipedia.org/w/index.php?search="],
];

async function renderSearch(url){
  const q = decodeURIComponent(url.slice("search://".length));
  setTitle(q);
  const ql = q.toLowerCase();
  const sites = await Store.all();
  const matches = sites.filter(s => s.name.toLowerCase().includes(ql) || s.slug.includes(ql));

  stage.innerHTML = `
    <div class="scroll"><div class="results">
      <p class="q">${escapeHtml(q)}</p>
      <p class="qsub">Results from across the web and your own sites</p>
      <div id="minehits"></div>
      <div id="weblist"><div class="searchload"><div class="spin"></div> Searching…</div></div>
      <div class="enginerow"><span class="lab">Want the full web? Open in a real tab:</span></div>
    </div></div>`;

  // matches from the user's own sites
  const mh = $("#minehits");
  for (const s of matches){
    const d = document.createElement("div"); d.className="minihit";
    d.onclick = ()=> navigate("mine://"+s.slug);
    const letter = (s.name||"S").trim()[0]?.toUpperCase()||"S";
    d.innerHTML = `<div class="f" style="background:${colorFor(s.name)}">${letter}</div>
                   <b>${escapeHtml(s.name)}</b><span class="s">mine://${s.slug}</span>`;
    mh.appendChild(d);
  }

  // permanent escape-hatch engine buttons
  const er = $(".enginerow");
  for (const [n, base] of ENGINES){
    const b = document.createElement("button"); b.className="chip"; b.textContent = n+" ↗";
    b.onclick = ()=> window.open(base+encodeURIComponent(q), "_blank", "noopener");
    er.appendChild(b);
  }

  // inline results from keyless, CORS-friendly sources
  let results = [];
  try { results = await searchAll(q); } catch(e){ results = []; }
  if (curUrl(activeTab()) !== url) return;     // user navigated away mid-request
  const list = $("#weblist");
  if (!list) return;
  if (!results.length){
    list.innerHTML = `<div class="errbox">No inline results for “${escapeHtml(q)}”. The engine buttons below open the full web for this search.</div>`;
    return;
  }
  list.innerHTML = "";
  for (const r of results){
    let host = r.url; try{ host = new URL(r.url).hostname.replace(/^www\./,""); }catch(e){}
    const a = document.createElement("div"); a.className="result";
    a.onclick = ()=> navigate(r.url);
    a.innerHTML = `<p class="rhost">${escapeHtml(host)}${r.src?` · ${escapeHtml(r.src)}`:""}</p>
                   <h3>${escapeHtml(r.title||r.url)}</h3>
                   <p>${escapeHtml(r.snippet||"")}</p>`;
    list.appendChild(a);
  }
}

// Strip HTML tags / decode entities safely (no script execution).
function stripHtml(s){
  try { return new DOMParser().parseFromString(String(s),"text/html").body.textContent || ""; }
  catch(e){ return String(s).replace(/<[^>]+>/g,""); }
}

// Run both sources in parallel, merge, de-dupe by URL.
async function searchAll(q){
  const [ddg, wiki] = await Promise.allSettled([ ddgSearch(q), wikiSearch(q) ]);
  const out = [], seen = new Set();
  const push = (r)=>{ if(!r||!r.url) return; const k=r.url.replace(/\/+$/,""); if(seen.has(k))return; seen.add(k); out.push(r); };
  if (ddg.status==="fulfilled")  ddg.value.forEach(push);
  if (wiki.status==="fulfilled") wiki.value.forEach(push);
  return out.slice(0,8);
}

// DuckDuckGo Instant Answer API — keyless. Often returns the official site for branded queries.
async function ddgSearch(q){
  const r = await fetch("https://api.duckduckgo.com/?format=json&no_html=1&skip_disambig=1&t=burrow&q="+encodeURIComponent(q));
  if (!r.ok) throw new Error("ddg "+r.status);
  const d = await r.json();
  const out = [];
  if (d.AbstractURL && d.Heading)
    out.push({ title:d.Heading, url:d.AbstractURL, snippet:d.AbstractText||"", src:"Web" });
  (d.Results||[]).slice(0,3).forEach(x=>{ if(x.FirstURL) out.push({ title:stripHtml(x.Text)||x.FirstURL, url:x.FirstURL, snippet:"", src:"Web" }); });
  (d.RelatedTopics||[]).forEach(x=>{ if(x.FirstURL) out.push({ title:stripHtml(x.Text)||x.FirstURL, url:x.FirstURL, snippet:"", src:"Web" }); });
  return out;
}

// Wikipedia search API — keyless, reliable CORS via origin=*.
async function wikiSearch(q){
  const r = await fetch("https://en.wikipedia.org/w/api.php?action=query&list=search&format=json&origin=*&srlimit=6&srsearch="+encodeURIComponent(q));
  if (!r.ok) throw new Error("wiki "+r.status);
  const d = await r.json();
  return (d.query?.search||[]).map(s=>({
    title: s.title,
    url: "https://en.wikipedia.org/wiki/"+encodeURIComponent(s.title.replace(/ /g,"_")),
    snippet: stripHtml(s.snippet||"") + "…",
    src: "Wikipedia"
  }));
}

/* ---------- WEB: a real external site ---------- */
function renderWeb(url){
  let host=url; try{ host=new URL(url).hostname.replace(/^www\./,""); }catch(e){}
  setTitle(host);
  stage.innerHTML = `
    <div class="overlay" id="ov">
      <div class="spin"></div>
      <div class="grow">Loading <strong>${escapeHtml(host)}</strong>…</div>
      <button class="btn ghost" id="ovext">Open for real ↗</button>
    </div>
    <div class="blocked" id="blocked" style="display:none">
      <div class="ic">🔒</div>
      <h2>${escapeHtml(host)} won't embed here</h2>
      <p>Lots of big sites block being shown inside another page for security. That's a browser rule Juju can't override — but it opens fine in a normal tab.</p>
      <button class="btn primary" id="bext">Open ${escapeHtml(host)} for real ↗</button>
    </div>`;
  const f = document.createElement("iframe");
  f.className="frame"; f.src=url;
  stage.appendChild(f);

  const ov = $("#ov");
  let loaded=false;
  f.addEventListener("load", ()=>{ loaded=true; if(ov) ov.style.display="none"; });
  // If it never fires "load" in a few seconds, it's almost certainly blocked.
  setTimeout(()=>{
    if(!loaded){ if(ov) ov.style.display="none"; const b=$("#blocked"); if(b) b.style.display="flex"; }
  }, 3500);

  const open = ()=> window.open(url, "_blank", "noopener");
  $("#ovext").onclick = open;
  const bext=$("#bext"); if(bext) bext.onclick=open;
}

/* ---------- enter / change name ---------- */
async function enter(name){
  const id = name.toLowerCase();
  await Accounts.register(name);                    // add to the shared People list
  const acct = (await Accounts.all())[id];
  currentUser = acct ? acct.username : name;        // display name (first spelling wins)
  await Store.setUser(id);                          // storage keyed by stable lowercased name
  History.setUser(id);
  await Session.set(id);
  hideLock();
  $("#browser").style.display="flex";
  updateAccountChip();
  tabs = []; activeId = null;
  newTab("home://");
}
async function changeName(){
  $("#acctmenu").style.display="none";
  await Session.clear();
  currentUser = null;
  tabs = []; activeId = null;
  incognito = false; document.body.classList.remove("incognito");
  $("#incpill").style.display="none"; $("#incbtn").classList.remove("on");
  $("#browser").style.display="none";
  showNameScreen();
}

/* ---------- name screen ---------- */
function showNameScreen(){
  const lock=$("#lock");
  lock.classList.add("show");
  lock.innerHTML = `
    <div class="lockcard">
      <div class="lb"><div class="logo">J</div><h1>juju</h1></div>
      <p class="tag">What should we call you?</p>
      <label>Your name</label>
      <input id="lu" autocomplete="off" placeholder="e.g. Red" maxlength="24" />
      <p class="err" id="lerr"></p>
      <button class="go" id="lgo">Enter Juju</button>
      <p class="note">No passwords — your name is just how you show up to others on Juju, and it keeps your sites and history together. You can change it anytime.</p>
    </div>`;
  const inp=$("#lu"), err=$("#lerr");
  inp.focus();
  const submit=async ()=>{ const n=inp.value.trim(); if(!n){ err.textContent="Type a name to continue."; inp.focus(); return; } await enter(n); };
  $("#lgo").onclick=submit;
  inp.addEventListener("keydown", e=>{ if(e.key==="Enter") submit(); });
}
function hideLock(){ const l=$("#lock"); l.classList.remove("show"); l.innerHTML=""; }

/* ---------- boot ---------- */
(async function boot(){
  await migrateLegacy();   // bring any old per-device data into the shared, cross-device store
  const cur = await Session.get();
  if (cur) await enter(cur);
  else showNameScreen();
})();
