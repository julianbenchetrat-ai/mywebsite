<!DOCTYPE html>
<html>
<head>
<title>Gold Lobby Hub</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(120deg,#000,#111,#000);
overflow:hidden;
}

body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle,#ffd70022 10%,transparent 40%);
animation:move 6s linear infinite;
}

@keyframes move{
0%{transform:translate(-25%,-25%)}
50%{transform:translate(0%,0%)}
100%{transform:translate(-25%,-25%)}
}

.card{
position:relative;
z-index:2;
background:#0b0b0b;
border:1px solid #ffd70055;
box-shadow:0 0 20px #ffd70033;
padding:20px;
border-radius:15px;
width:420px;
text-align:center;
}

h2{color:#ffd700}

input,textarea{
width:90%;
padding:8px;
margin:5px;
border:none;
border-radius:8px;
outline:none;
background:#111;
color:white;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
background:#ffd700;
color:black;
font-weight:bold;
}

button:hover{opacity:.8}

.nav button{width:30%}

.note{
background:#111;
border:1px solid #333;
padding:8px;
margin:6px 0;
border-radius:8px;
position:relative;
}

.close{
position:absolute;
top:5px;
right:8px;
background:red;
color:white;
border:none;
border-radius:50%;
width:22px;
height:22px;
font-size:12px;
cursor:pointer;
}

.small{font-size:12px;opacity:.7}
</style>
</head>

<body>

<div id="app"></div>

<script>
const app=document.getElementById("app");

const getU=()=>localStorage.getItem("u");
const setU=u=>localStorage.setItem("u",u);
const getDB=()=>JSON.parse(localStorage.getItem("db")||"{}");
const setDB=d=>localStorage.setItem("db",JSON.stringify(d));

// ---------- LOGIN ----------
function loginUI(msg=""){
app.innerHTML=`
<div class="card">
<h2>🔐 GOLD HUB LOGIN</h2>

<input id="u" placeholder="username">
<input id="p" type="password" placeholder="password">

<div style="color:red;font-size:12px">${msg}</div>

<button onclick="login()">Enter Hub</button>
</div>`;
}

function login(){
let u=document.getElementById("u").value.trim();
let p=document.getElementById("p").value;
if(!u||!p)return loginUI("Fill everything");

let db=getDB();

if(!db[u]){
db[u]={pass:p,notes:[]};
}

if(db[u].pass!==p)return loginUI("Wrong password ❌");

setDB(db);
setU(u);
lobby();
}

// ---------- LOBBY ----------
function lobby(){
let u=getU();
if(!u)return loginUI();

app.innerHTML=`
<div class="card">
<h2>👑 GOLD LOBBY</h2>

<div class="nav">
<button onclick="show('games')">🎮 Games</button>
<button onclick="show('movies')">🎬 Movies</button>
<button onclick="show('notes')">📝 Notes</button>
</div>

<div id="view"></div>

<button onclick="save()">💾 Save</button>
<button onclick="logout()">🚪 Logout</button>
</div>`;

show("notes");
}

// ---------- VIEWS ----------
function show(type){
let u=getU();
let db=getDB();
let v=document.getElementById("view");

if(type==="games"){
v.innerHTML=`<h3>🎮 Games</h3><p>Coming soon...</p>`;
}

if(type==="movies"){
v.innerHTML=`<h3>🎬 Movies</h3><p>Coming soon...</p>`;
}

if(type==="notes"){
v.innerHTML=`
<h3>📝 Notes</h3>
<button onclick="addNote()">+ Add Note</button>
<div id="box"></div>
`;

let box=document.getElementById("box");

db[u].notes.forEach((n,i)=>{
box.innerHTML+=`
<div class="note">
<button class="close" onclick="del(${i})">x</button>

<input value="${n.title||"Note"}" oninput="rename(${i},this.value)">
<textarea oninput="edit(${i},this.value)">${n.text||""}</textarea>
</div>`;
});
}
}

// ---------- NOTES ----------
function addNote(){
let u=getU();
let db=getDB();
db[u].notes.push({title:"New Note",text:""});
setDB(db);
lobby();
}

function edit(i,val){
let u=getU();
let db=getDB();
db[u].notes[i].text=val;
setDB(db);
}

function rename(i,val){
let u=getU();
let db=getDB();
db[u].notes[i].title=val;
setDB(db);
}

function del(i){
let u=getU();
let db=getDB();
db[u].notes.splice(i,1);   // 🔥 remove note
setDB(db);
lobby();
}

// ---------- SAVE ----------
function save(){
alert("💾 Saved!");
}

// ---------- LOGOUT ----------
function logout(){
localStorage.removeItem("u");
loginUI();
}

// ---------- START ----------
getU()?lobby():loginUI();
</script>

</body>
</html>
