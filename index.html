<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gold Hub OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#E8C158;
  --bg:#0a0908; --bg2:#100e0b; --panel:rgba(24,21,16,.74); --panel2:rgba(32,28,21,.9);
  --line:rgba(232,193,88,.16); --line2:rgba(255,255,255,.07);
  --txt:#f4efe4; --muted:#9b948786; --muted2:#9b9487;
  --good:#62c98a; --warn:#e8a33c; --bad:#e3706c;
  --rad:18px; --sb:78px;
  --glow:color-mix(in srgb,var(--accent) 50%,transparent);
  --soft:color-mix(in srgb,var(--accent) 14%,transparent);
  --softer:color-mix(in srgb,var(--accent) 8%,transparent);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:'Inter',-apple-system,Segoe UI,system-ui,sans-serif;
  background:var(--bg); color:var(--txt); overflow:hidden;
  -webkit-font-smoothing:antialiased;
}
#bg{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(900px 600px at 12% -5%,color-mix(in srgb,var(--accent) 16%,transparent),transparent 60%),
    radial-gradient(800px 600px at 100% 0%,color-mix(in srgb,var(--accent) 9%,transparent),transparent 55%),
    radial-gradient(700px 700px at 50% 120%,color-mix(in srgb,var(--accent) 7%,transparent),transparent 60%),
    linear-gradient(180deg,var(--bg),var(--bg2));
}
#bg::after{content:'';position:absolute;inset:0;opacity:.5;
  background-image:radial-gradient(rgba(255,255,255,.025) 1px,transparent 1px);
  background-size:42px 42px;mask:radial-gradient(80% 80% at 50% 30%,#000,transparent)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--soft);border-radius:20px;border:2px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-track{background:transparent}
button{font-family:inherit;cursor:pointer;border:none;color:inherit}
input,textarea,select{font-family:inherit;color:var(--txt);background:rgba(0,0,0,.28);
  border:1px solid var(--line2);border-radius:12px;padding:11px 13px;width:100%;outline:none;transition:.18s;font-size:14px}
input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--softer)}
textarea{resize:vertical;line-height:1.55}
::placeholder{color:#7d776d}
a{color:var(--accent);text-decoration:none}
.mono{font-family:'JetBrains Mono',ui-monospace,monospace}
.serif{font-family:'Fraunces',Georgia,serif}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:7px;justify-content:center;
  padding:10px 15px;border-radius:12px;font-weight:600;font-size:13.5px;
  background:rgba(255,255,255,.05);border:1px solid var(--line2);transition:.16s;white-space:nowrap}
.btn:hover{background:rgba(255,255,255,.09);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn.gold{background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 70%,#fff 0%));
  color:#1a1408;border:none;box-shadow:0 6px 22px -8px var(--glow)}
.btn.gold:hover{box-shadow:0 10px 28px -8px var(--glow)}
.btn.ghost{background:transparent}
.btn.sm{padding:7px 11px;font-size:12.5px;border-radius:10px}
.btn.danger:hover{color:var(--bad);border-color:color-mix(in srgb,var(--bad) 40%,transparent)}
.iconbtn{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:rgba(255,255,255,.04);border:1px solid var(--line2);transition:.16s;font-size:16px}
.iconbtn:hover{background:rgba(255,255,255,.09);color:var(--accent)}

/* glass surfaces */
.glass{background:var(--panel);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--line);border-radius:var(--rad);box-shadow:0 18px 50px -28px rgba(0,0,0,.9)}
.pad{padding:20px}

/* ---- LOGIN ---- */
#login{position:fixed;inset:0;z-index:5;display:grid;place-items:center;padding:24px}
.lcard{width:100%;max-width:420px;padding:34px 30px;animation:rise .6s cubic-bezier(.2,.8,.2,1)}
.crest{width:64px;height:64px;border-radius:20px;display:grid;place-items:center;font-size:30px;margin-bottom:18px;
  background:linear-gradient(135deg,var(--soft),transparent);border:1px solid var(--line);
  box-shadow:0 0 40px -10px var(--glow)}
.lcard h1{font-size:30px;font-weight:600;letter-spacing:-.5px}
.lcard .sub{color:var(--muted2);font-size:14px;margin:4px 0 24px}
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;color:var(--muted2);margin-bottom:6px;font-weight:500}
.err{color:var(--bad);font-size:13px;min-height:18px;margin:4px 0}
.hint{font-size:11.5px;color:#6e685f;margin-top:14px;line-height:1.5;text-align:center}

/* ---- APP SHELL ---- */
#app{display:none;position:relative;z-index:1;height:100vh}
.shell{display:grid;grid-template-columns:var(--sb) 1fr;height:100vh}
.rail{background:rgba(12,11,8,.7);backdrop-filter:blur(14px);border-right:1px solid var(--line);
  display:flex;flex-direction:column;align-items:center;padding:16px 0;gap:6px;z-index:3}
.rail .logo{width:46px;height:46px;border-radius:14px;display:grid;place-items:center;font-size:22px;margin-bottom:14px;
  background:linear-gradient(135deg,var(--soft),transparent);border:1px solid var(--line)}
.nav{width:50px;height:50px;border-radius:14px;display:grid;place-items:center;font-size:20px;
  color:var(--muted2);transition:.18s;position:relative;background:transparent;border:1px solid transparent}
.nav:hover{color:var(--txt);background:rgba(255,255,255,.05)}
.nav.on{color:var(--accent);background:var(--softer);border-color:var(--line);box-shadow:0 0 18px -6px var(--glow)}
.nav.on::before{content:'';position:absolute;left:-16px;top:50%;transform:translateY(-50%);width:3px;height:22px;background:var(--accent);border-radius:3px}
.nav .tip{position:absolute;left:60px;top:50%;transform:translateY(-50%) scale(.9);background:var(--panel2);
  border:1px solid var(--line);padding:5px 10px;border-radius:9px;font-size:12.5px;white-space:nowrap;opacity:0;
  pointer-events:none;transition:.15s;z-index:9;font-weight:500}
.nav:hover .tip{opacity:1;transform:translateY(-50%) scale(1)}
.spacer{flex:1}

.content{overflow:auto;height:100vh}
.topbar{position:sticky;top:0;z-index:2;display:flex;align-items:center;gap:14px;padding:16px 26px;
  background:linear-gradient(180deg,rgba(10,9,8,.92),rgba(10,9,8,.55));backdrop-filter:blur(10px);border-bottom:1px solid var(--line2)}
.topbar h2{font-size:18px;font-weight:600;letter-spacing:-.3px}
.topbar .eb{font-size:11px;letter-spacing:2px;color:var(--accent);text-transform:uppercase;font-weight:600}
.cmd{margin-left:auto;display:flex;align-items:center;gap:8px;color:var(--muted2);font-size:13px;
  background:rgba(255,255,255,.04);border:1px solid var(--line2);padding:8px 12px;border-radius:11px;transition:.16s}
.cmd:hover{border-color:var(--accent);color:var(--txt)}
.cmd kbd{font-family:'JetBrains Mono';font-size:11px;background:rgba(255,255,255,.07);padding:2px 6px;border-radius:6px;border:1px solid var(--line2)}
.who{display:flex;align-items:center;gap:9px;padding:6px 12px 6px 6px;border-radius:30px;background:rgba(255,255,255,.04);border:1px solid var(--line2)}
.who .av{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-size:16px;background:var(--soft);border:1px solid var(--line)}
.view{padding:26px;max-width:1180px}

/* section heads */
.sec-h{display:flex;align-items:center;gap:12px;margin:2px 0 16px;flex-wrap:wrap}
.sec-h h3{font-size:15px;font-weight:600}
.sec-h .ln{flex:1;height:1px;background:var(--line2);min-width:20px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.grow{flex:1;min-width:160px}

/* HOME */
.hero{display:grid;grid-template-columns:1.4fr 1fr;gap:18px;margin-bottom:20px}
@media(max-width:820px){.hero{grid-template-columns:1fr}}
.hero-l{padding:26px;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden}
.hero-l::after{content:'';position:absolute;right:-40px;top:-40px;width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle,var(--soft),transparent 70%)}
.greet{font-size:13px;color:var(--accent);letter-spacing:1px;text-transform:uppercase;font-weight:600}
.hero-l h1{font-size:34px;font-weight:600;letter-spacing:-1px;margin:6px 0 2px}
.hero-l .date{color:var(--muted2);font-size:14px}
.clock{font-size:54px;font-weight:600;letter-spacing:-2px;margin-top:10px;font-family:'Fraunces';
  background:linear-gradient(120deg,#fff,var(--accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hero-r{padding:22px;display:flex;flex-direction:column;gap:12px}
.qa{display:flex;gap:8px}
.qa input{flex:1}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
@media(max-width:820px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{padding:18px;transition:.2s;cursor:pointer;position:relative;overflow:hidden}
.stat:hover{transform:translateY(-3px);border-color:var(--line)}
.stat .ic{font-size:18px;width:40px;height:40px;border-radius:12px;display:grid;place-items:center;background:var(--softer);border:1px solid var(--line);margin-bottom:14px}
.stat .n{font-size:32px;font-weight:600;font-family:'Fraunces';letter-spacing:-1px}
.stat .l{font-size:12.5px;color:var(--muted2);margin-top:2px}

.cols2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:820px){.cols2{grid-template-columns:1fr}}
.list-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:13px;transition:.15s;cursor:pointer;border:1px solid transparent}
.list-item:hover{background:rgba(255,255,255,.04);border-color:var(--line2)}
.list-item .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);flex-shrink:0}
.list-item .t{flex:1;font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.list-item .meta{font-size:11.5px;color:var(--muted2)}
.empty{text-align:center;color:var(--muted2);padding:30px 14px;font-size:13.5px}
.empty .big{font-size:34px;opacity:.4;margin-bottom:8px}

/* NOTES */
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
.toolbar .search{flex:1;min-width:200px;position:relative}
.toolbar .search input{padding-left:38px}
.toolbar .search .mag{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.5}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.chip{padding:6px 13px;border-radius:30px;font-size:12.5px;background:rgba(255,255,255,.04);border:1px solid var(--line2);transition:.15s;font-weight:500}
.chip.on{background:var(--soft);border-color:var(--accent);color:var(--accent)}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
.ncard{padding:16px;cursor:pointer;transition:.18s;position:relative;display:flex;flex-direction:column;min-height:140px;border-left:3px solid var(--cc,var(--accent))}
.ncard:hover{transform:translateY(-3px)}
.ncard.folder{border-left-color:var(--muted2);background:var(--panel2)}
.ncard .ic{font-size:20px;margin-bottom:8px}
.ncard h4{font-size:15px;font-weight:600;margin-bottom:5px;display:flex;gap:6px;align-items:center}
.ncard p{font-size:12.5px;color:var(--muted2);line-height:1.5;flex:1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.ncard .ft{display:flex;gap:6px;align-items:center;margin-top:10px;font-size:11px;color:#6e685f}
.ntag{font-size:10.5px;padding:2px 7px;border-radius:20px;background:var(--softer);color:var(--accent);font-weight:600}
.pin{position:absolute;top:12px;right:12px;font-size:13px}

/* editor */
.editor{display:grid;grid-template-columns:1fr;gap:14px}
.editor .meta-row{display:flex;gap:10px;flex-wrap:wrap}
.editor .meta-row>*{flex:1;min-width:130px}
.ed-title{font-size:22px;font-weight:600;font-family:'Fraunces';background:transparent;border:none;border-bottom:1px solid var(--line2);border-radius:0;padding:8px 2px}
.ed-title:focus{box-shadow:none;border-color:var(--accent)}
.ed-body{min-height:340px;font-size:14.5px}
.preview{padding:18px;line-height:1.65;font-size:14.5px;min-height:340px}
.preview h1,.preview h2,.preview h3{font-family:'Fraunces';margin:14px 0 8px}
.preview h1{font-size:24px}.preview h2{font-size:20px}.preview h3{font-size:17px}
.preview code{font-family:'JetBrains Mono';background:rgba(255,255,255,.07);padding:2px 6px;border-radius:6px;font-size:.9em}
.preview pre{background:rgba(0,0,0,.4);padding:14px;border-radius:12px;overflow:auto;margin:10px 0;border:1px solid var(--line2)}
.preview pre code{background:none;padding:0}
.preview ul,.preview ol{margin:8px 0 8px 22px}
.preview li{margin:4px 0}
.preview a{border-bottom:1px solid var(--soft)}
.preview blockquote{border-left:3px solid var(--accent);padding-left:14px;color:var(--muted2);margin:10px 0}
.seg{display:inline-flex;background:rgba(0,0,0,.3);border:1px solid var(--line2);border-radius:11px;padding:3px;gap:3px}
.seg button{padding:6px 13px;border-radius:8px;font-size:12.5px;color:var(--muted2);background:transparent;font-weight:600}
.seg button.on{background:var(--soft);color:var(--accent)}

/* TASKS */
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;align-items:start}
@media(max-width:820px){.board{grid-template-columns:1fr}}
.col{padding:14px;min-height:160px}
.col-h{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px;font-weight:600}
.col-h .cnt{margin-left:auto;font-size:11px;color:var(--muted2);background:rgba(255,255,255,.06);padding:2px 8px;border-radius:20px}
.task{padding:12px;border-radius:13px;background:rgba(255,255,255,.035);border:1px solid var(--line2);margin-bottom:9px;transition:.15s;border-left:3px solid var(--pc,var(--muted2))}
.task:hover{background:rgba(255,255,255,.06)}
.task .tt{font-size:13.5px;font-weight:500;margin-bottom:7px}
.task .tb{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.task .due{font-size:11px;color:var(--muted2)}
.mini{width:28px;height:26px;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid var(--line2);display:grid;place-items:center;font-size:13px;transition:.15s}
.mini:hover{background:var(--soft);color:var(--accent)}
.prog{height:7px;border-radius:10px;background:rgba(255,255,255,.07);overflow:hidden;margin:4px 0 18px}
.prog>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--good));transition:width .5s cubic-bezier(.2,.8,.2,1)}

/* CODE */
.code-wrap{display:grid;grid-template-columns:1fr 1fr;gap:14px;height:calc(100vh - 200px);min-height:440px}
@media(max-width:900px){.code-wrap{grid-template-columns:1fr;height:auto}}
.editor-pane{display:flex;flex-direction:column;gap:10px;min-height:0}
.code-tabs{display:flex;gap:4px}
.code-tabs button{padding:7px 14px;border-radius:9px 9px 0 0;font-size:12.5px;font-weight:600;color:var(--muted2);background:rgba(255,255,255,.03)}
.code-tabs button.on{background:rgba(0,0,0,.4);color:var(--accent)}
.code-area{flex:1;font-family:'JetBrains Mono';font-size:13px;line-height:1.6;min-height:240px;tab-size:2;background:rgba(0,0,0,.45)}
.preview-pane{display:flex;flex-direction:column;gap:10px;min-height:0}
iframe.run{flex:1;width:100%;border:none;background:#fff;border-radius:14px;min-height:300px;box-shadow:0 18px 40px -22px #000}
.proj-bar{display:flex;gap:8px;overflow:auto;padding-bottom:4px}
.proj-pill{padding:7px 13px;border-radius:11px;font-size:12.5px;background:rgba(255,255,255,.04);border:1px solid var(--line2);white-space:nowrap;font-weight:500;transition:.15s}
.proj-pill:hover{border-color:var(--accent)}
.proj-pill.on{background:var(--soft);border-color:var(--accent);color:var(--accent)}

/* LINKS */
.link-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:13px}
.link-tile{padding:18px 14px;text-align:center;transition:.18s;cursor:pointer;position:relative}
.link-tile:hover{transform:translateY(-3px)}
.link-tile .fav{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;font-size:22px;margin:0 auto 10px;
  background:var(--softer);border:1px solid var(--line)}
.link-tile .lt{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.link-tile .lu{font-size:11px;color:var(--muted2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.link-tile .x{position:absolute;top:8px;right:8px;opacity:0;font-size:12px;transition:.15s;color:var(--bad)}
.link-tile:hover .x{opacity:.7}

/* TOOLS */
.tools-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:820px){.tools-grid{grid-template-columns:1fr}}
.tool{padding:20px}
.tool h3{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:9px}
/* pomodoro */
.pomo{text-align:center}
.pomo .ring{width:170px;height:170px;margin:6px auto 14px;position:relative}
.pomo svg{transform:rotate(-90deg)}
.pomo .pt{position:absolute;inset:0;display:grid;place-items:center;font-size:38px;font-weight:600;font-family:'JetBrains Mono'}
.pomo .modes{display:flex;gap:6px;justify-content:center;margin-bottom:14px}
/* calc */
.calc-screen{text-align:right;font-family:'JetBrains Mono';font-size:30px;padding:18px;background:rgba(0,0,0,.4);
  border-radius:14px;margin-bottom:12px;min-height:64px;overflow:hidden;font-weight:600;border:1px solid var(--line2)}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
.calc-grid button{padding:16px 0;border-radius:12px;font-size:17px;font-weight:600;background:rgba(255,255,255,.05);border:1px solid var(--line2);transition:.12s}
.calc-grid button:hover{background:rgba(255,255,255,.1)}
.calc-grid button.op{background:var(--softer);color:var(--accent)}
.calc-grid button.eq{background:var(--accent);color:#1a1408}
.calc-grid button.wide{grid-column:span 2}
/* counters */
.counter{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:13px;background:rgba(255,255,255,.035);border:1px solid var(--line2);margin-bottom:9px}
.counter .cn{flex:1;font-weight:500}
.counter .cv{font-family:'JetBrains Mono';font-size:24px;font-weight:600;min-width:54px;text-align:center;color:var(--accent)}
.cbtn{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.06);border:1px solid var(--line2);font-size:18px;display:grid;place-items:center;transition:.12s}
.cbtn:hover{background:var(--soft);color:var(--accent)}

/* SETTINGS */
.set-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:820px){.set-grid{grid-template-columns:1fr}}
.swatches{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
.sw{width:40px;height:40px;border-radius:12px;cursor:pointer;border:2px solid transparent;transition:.15s;position:relative}
.sw:hover{transform:scale(1.08)}
.sw.on{border-color:#fff}
.sw.on::after{content:'✓';position:absolute;inset:0;display:grid;place-items:center;color:#1a1408;font-weight:800;font-size:15px}
.set-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line2)}
.set-row:last-child{border:none}
.set-row .si{flex:1}
.set-row .si .st{font-weight:500;font-size:14px}
.set-row .si .sd{font-size:12px;color:var(--muted2);margin-top:2px}

/* MODAL */
.overlay{position:fixed;inset:0;z-index:50;background:rgba(5,4,3,.6);backdrop-filter:blur(6px);
  display:grid;place-items:center;padding:20px;animation:fade .2s}
.modal{width:100%;max-width:440px;padding:26px;animation:rise .3s cubic-bezier(.2,.8,.2,1)}
.modal h3{font-size:19px;font-weight:600;margin-bottom:4px;font-family:'Fraunces'}
.modal .md{color:var(--muted2);font-size:13.5px;margin-bottom:18px}
.modal .mfield{margin-bottom:13px}
.modal .mfield label{display:block;font-size:12px;color:var(--muted2);margin-bottom:6px;font-weight:500}
.modal .actions{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}

/* COMMAND PALETTE */
.cmdk{position:fixed;inset:0;z-index:60;background:rgba(5,4,3,.55);backdrop-filter:blur(8px);
  display:flex;justify-content:center;align-items:flex-start;padding:90px 20px 20px;animation:fade .15s}
.cmdk-box{width:100%;max-width:560px;padding:0;overflow:hidden;animation:rise .25s cubic-bezier(.2,.8,.2,1)}
.cmdk-in{display:flex;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid var(--line2)}
.cmdk-in input{border:none;background:none;font-size:17px;padding:0}
.cmdk-in input:focus{box-shadow:none}
.cmdk-list{max-height:50vh;overflow:auto;padding:8px}
.cmdk-item{display:flex;align-items:center;gap:13px;padding:11px 13px;border-radius:11px;cursor:pointer;transition:.1s}
.cmdk-item.sel,.cmdk-item:hover{background:var(--soft)}
.cmdk-item .ci{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-size:16px;background:rgba(255,255,255,.05);border:1px solid var(--line2);flex-shrink:0}
.cmdk-item .ct{flex:1}
.cmdk-item .ct .a{font-size:14px;font-weight:500}
.cmdk-item .ct .b{font-size:11.5px;color:var(--muted2)}
.cmdk-item .k{font-size:10.5px;color:var(--muted2);background:rgba(255,255,255,.06);padding:3px 8px;border-radius:7px}
.cmdk-cat{font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted2);padding:10px 13px 4px;font-weight:600}

/* TOAST */
#toasts{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:70;display:flex;flex-direction:column;gap:10px;align-items:center}
.toast{background:var(--panel2);backdrop-filter:blur(16px);border:1px solid var(--line);padding:12px 18px;border-radius:13px;
  font-size:13.5px;font-weight:500;display:flex;align-items:center;gap:10px;box-shadow:0 16px 40px -16px #000;animation:toastin .35s cubic-bezier(.2,.8,.2,1)}
.toast .ti{width:8px;height:8px;border-radius:50%;background:var(--good)}
.toast.warn .ti{background:var(--warn)}.toast.bad .ti{background:var(--bad)}

@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes toastin{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
@media(max-width:560px){.view{padding:16px}.topbar{padding:13px 16px}.cmd .lbl{display:none}}
</style>
</head>
<body>
<div id="bg"></div>

<!-- LOGIN -->
<div id="login">
  <div class="glass lcard">
    <div class="crest">👑</div>
    <h1 class="serif">Gold&nbsp;Hub<span style="color:var(--accent)">.</span></h1>
    <div class="sub">Your private command center.</div>
    <div class="field"><label>Username</label><input id="lu" placeholder="e.g. red" autocomplete="username"></div>
    <div class="field"><label>Password</label><input id="lp" type="password" placeholder="••••••••" autocomplete="current-password"></div>
    <div class="err" id="lerr"></div>
    <button class="btn gold" style="width:100%" id="lbtn">Enter the hub →</button>
    <div class="hint">New username? An account is created automatically.<br>Everything is stored locally in this browser only.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="shell">
    <nav class="rail">
      <div class="logo">👑</div>
      <button class="nav on" data-tab="home"><span>🏠</span><span class="tip">Dashboard</span></button>
      <button class="nav" data-tab="notes"><span>📝</span><span class="tip">Notes</span></button>
      <button class="nav" data-tab="tasks"><span>✅</span><span class="tip">Tasks</span></button>
      <button class="nav" data-tab="code"><span>🌐</span><span class="tip">Code Lab</span></button>
      <button class="nav" data-tab="links"><span>🔖</span><span class="tip">Launcher</span></button>
      <button class="nav" data-tab="tools"><span>🧰</span><span class="tip">Tools</span></button>
      <div class="spacer"></div>
      <button class="nav" data-tab="settings"><span>⚙️</span><span class="tip">Settings</span></button>
      <button class="nav" id="logout"><span>🚪</span><span class="tip">Log out</span></button>
    </nav>
    <main class="content">
      <div class="topbar">
        <div><div class="eb" id="tbEb">Dashboard</div><h2 id="tbTitle">Welcome</h2></div>
        <button class="cmd" id="cmdBtn"><span>🔍</span><span class="lbl">Search & commands</span><kbd>⌘K</kbd></button>
        <div class="who"><span class="av" id="whoAv">🙂</span><span id="whoName" style="font-size:13px;font-weight:500"></span></div>
      </div>
      <div class="view" id="view"></div>
    </main>
  </div>
</div>

<div id="toasts"></div>

<script>
"use strict";
/* ============ STORAGE ============ */
const KEY='goldhub_os_v1', UKEY='goldhub_os_user';
let DB=load(), user=localStorage.getItem(UKEY);
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{users:{}}}catch(e){return{users:{}}}}
function save(){localStorage.setItem(KEY,JSON.stringify(DB))}
function U(){return DB.users[user]}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function esc(s){return(s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function $(id){return document.getElementById(id)}

const ACCENTS={gold:'#E8C158',emerald:'#5ec98a',cyber:'#46d3e6',rose:'#f06f9c',violet:'#a78bfa',amber:'#f0a23c',mono:'#cfc9bd'};

/* ============ TOAST ============ */
function toast(msg,kind=''){
  const t=document.createElement('div');t.className='toast '+kind;
  t.innerHTML=`<span class="ti"></span>${esc(msg)}`;
  $('toasts').appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transform='translateY(10px)';setTimeout(()=>t.remove(),300)},2400);
}

/* ============ MODAL ============ */
// fields: [{key,label,type,value,placeholder,options}]  -> resolves object or null
function modal({title,desc='',fields=[],confirm='Save',danger=false}){
  return new Promise(res=>{
    const ov=document.createElement('div');ov.className='overlay';
    const body=fields.map(f=>{
      if(f.type==='textarea')return `<div class="mfield"><label>${esc(f.label)}</label><textarea data-k="${f.key}" style="min-height:90px" placeholder="${esc(f.placeholder||'')}">${esc(f.value||'')}</textarea></div>`;
      if(f.type==='select')return `<div class="mfield"><label>${esc(f.label)}</label><select data-k="${f.key}">${f.options.map(o=>`<option value="${esc(o.v)}" ${o.v==f.value?'selected':''}>${esc(o.t)}</option>`).join('')}</select></div>`;
      return `<div class="mfield"><label>${esc(f.label)}</label><input data-k="${f.key}" type="${f.type||'text'}" value="${esc(f.value||'')}" placeholder="${esc(f.placeholder||'')}"></div>`;
    }).join('');
    ov.innerHTML=`<div class="glass modal"><h3>${esc(title)}</h3>${desc?`<div class="md">${esc(desc)}</div>`:''}${body}
      <div class="actions"><button class="btn ghost" data-x>Cancel</button><button class="btn gold ${danger?'danger':''}" data-ok>${esc(confirm)}</button></div></div>`;
    document.body.appendChild(ov);
    const first=ov.querySelector('input,textarea,select');if(first)first.focus();
    const collect=()=>{const o={};ov.querySelectorAll('[data-k]').forEach(el=>o[el.dataset.k]=el.value);return o};
    const close=v=>{ov.remove();res(v)};
    ov.querySelector('[data-ok]').onclick=()=>close(collect());
    ov.querySelector('[data-x]').onclick=()=>close(null);
    ov.onclick=e=>{if(e.target===ov)close(null)};
    ov.onkeydown=e=>{if(e.key==='Escape')close(null);if(e.key==='Enter'&&e.target.tagName!=='TEXTAREA'){close(collect())}};
  });
}
async function confirmModal(title,desc,confirm='Delete'){
  const r=await modal({title,desc,fields:[],confirm,danger:true});return r!==null;
}

/* ============ AUTH ============ */
function showLogin(err=''){
  $('login').style.display='grid';$('app').style.display='none';$('lerr').textContent=err;
}
function doLogin(){
  const u=$('lu').value.trim(), p=$('lp').value;
  if(!u||!p)return $('lerr').textContent='Enter a username and password.';
  if(!DB.users[u])DB.users[u]=blankUser(p);
  else if(DB.users[u].pass!==p)return $('lerr').textContent='Wrong password for that user.';
  user=u;localStorage.setItem(UKEY,u);save();enterApp();
}
function blankUser(pass){return{pass,avatar:'🦊',notes:[],folders:[],tasks:[],projects:[],links:[],counters:[],
  settings:{accent:'gold'},created:Date.now()}}
$('lbtn').onclick=doLogin;
$('lp').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
$('lu').addEventListener('keydown',e=>{if(e.key==='Enter')$('lp').focus()});

function enterApp(){
  $('login').style.display='none';$('app').style.display='block';
  applyAccent(U().settings.accent||'gold');
  $('whoName').textContent=user;$('whoAv').textContent=U().avatar||'🙂';
  go('home');
}
function applyAccent(name){
  document.documentElement.style.setProperty('--accent',ACCENTS[name]||ACCENTS.gold);
}

/* ============ NAV ============ */
let TAB='home';
const TITLES={home:['Dashboard','Welcome back'],notes:['Notes','Your notebook'],tasks:['Tasks','Get things done'],
  code:['Code Lab','Build & preview'],links:['Launcher','Quick access'],tools:['Tools','Handy utilities'],settings:['Settings','Make it yours']};
function go(tab){
  TAB=tab;
  document.querySelectorAll('.nav[data-tab]').forEach(n=>n.classList.toggle('on',n.dataset.tab===tab));
  const[eb,ti]=TITLES[tab];$('tbEb').textContent=eb;$('tbTitle').textContent=ti;
  ({home:renderHome,notes:renderNotes,tasks:renderTasks,code:renderCode,links:renderLinks,tools:renderTools,settings:renderSettings}[tab])();
}
document.querySelectorAll('.nav[data-tab]').forEach(n=>n.onclick=()=>go(n.dataset.tab));
$('logout').onclick=()=>{localStorage.removeItem(UKEY);user=null;clearInterval(clockTimer);showLogin()};

/* ============ HOME ============ */
let clockTimer;
function renderHome(){
  const u=U();
  const openTasks=u.tasks.filter(t=>t.status!=='done').length;
  const recent=[...u.notes].sort((a,b)=>(b.updated||0)-(a.updated||0)).slice(0,5);
  const today=u.tasks.filter(t=>t.status!=='done').slice(0,5);
  $('view').innerHTML=`
  <div class="hero">
    <div class="glass hero-l">
      <div class="greet" id="greet"></div>
      <h1 class="serif">${esc(user)}</h1>
      <div class="date" id="hdate"></div>
      <div class="clock mono" id="clock">--:--</div>
    </div>
    <div class="glass hero-r">
      <div style="font-size:13px;color:var(--muted2);font-weight:500">Quick capture</div>
      <div class="qa"><input id="qaNote" placeholder="Jot a note…"><button class="btn gold sm" id="qaNoteBtn">＋</button></div>
      <div class="qa"><input id="qaTask" placeholder="Add a task…"><button class="btn sm" id="qaTaskBtn">＋</button></div>
      <div style="flex:1"></div>
      <button class="btn ghost sm" id="cmdBtn2">🔍 Open command palette · ⌘K</button>
    </div>
  </div>
  <div class="stats">
    ${stat('📝',u.notes.length,'Notes','notes')}
    ${stat('✅',openTasks,'Open tasks','tasks')}
    ${stat('🌐',u.projects.length,'Code projects','code')}
    ${stat('🔖',u.links.length,'Saved links','links')}
  </div>
  <div class="cols2">
    <div class="glass pad">
      <div class="sec-h"><h3>Recent notes</h3><div class="ln"></div><button class="btn ghost sm" onclick="go('notes')">All →</button></div>
      ${recent.length?recent.map(n=>`<div class="list-item" onclick="openNote('${n.id}')"><span class="dot" style="background:${esc(n.color||'var(--accent)')}"></span><span class="t">${esc(n.title||'Untitled')}${n.locked?' 🔒':''}</span><span class="meta">${timeAgo(n.updated)}</span></div>`).join(''):emptyState('🗒️','No notes yet','Capture your first thought above.')}
    </div>
    <div class="glass pad">
      <div class="sec-h"><h3>Up next</h3><div class="ln"></div><button class="btn ghost sm" onclick="go('tasks')">Board →</button></div>
      ${today.length?today.map(t=>`<div class="list-item" onclick="go('tasks')"><span class="dot" style="background:${prioColor(t.priority)}"></span><span class="t">${esc(t.title)}</span><span class="meta">${esc(t.status==='doing'?'in progress':'to do')}</span></div>`).join(''):emptyState('🎯','All clear','No open tasks. Nicely done.')}
    </div>
  </div>`;
  $('qaNoteBtn').onclick=()=>{const v=$('qaNote').value.trim();if(!v)return;u.notes.push(mkNote({title:v}));save();toast('Note saved');renderHome()};
  $('qaTaskBtn').onclick=()=>{const v=$('qaTask').value.trim();if(!v)return;u.tasks.push({id:uid(),title:v,status:'todo',priority:'med',due:'',created:Date.now()});save();toast('Task added');renderHome()};
  $('qaNote').addEventListener('keydown',e=>{if(e.key==='Enter')$('qaNoteBtn').click()});
  $('qaTask').addEventListener('keydown',e=>{if(e.key==='Enter')$('qaTaskBtn').click()});
  $('cmdBtn2').onclick=openCmd;
  startClock();
}
function stat(ic,n,l,tab){return `<div class="glass stat" onclick="go('${tab}')"><div class="ic">${ic}</div><div class="n mono">${n}</div><div class="l">${l}</div></div>`}
function emptyState(big,t,d){return `<div class="empty"><div class="big">${big}</div><div style="font-weight:600;color:var(--txt);margin-bottom:3px">${t}</div>${d}</div>`}
function startClock(){
  clearInterval(clockTimer);
  const tick=()=>{
    const d=new Date(),h=d.getHours();
    const cl=$('clock');if(!cl){clearInterval(clockTimer);return}
    cl.textContent=d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const g=$('greet');if(g)g.textContent=(h<5?'Burning the midnight oil':h<12?'Good morning':h<17?'Good afternoon':h<22?'Good evening':'Good night');
    const hd=$('hdate');if(hd)hd.textContent=d.toLocaleDateString([], {weekday:'long',month:'long',day:'numeric',year:'numeric'});
  };
  tick();clockTimer=setInterval(tick,1000);
}
function timeAgo(ts){if(!ts)return'';const s=(Date.now()-ts)/1000;if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago'}
function prioColor(p){return p==='high'?'var(--bad)':p==='low'?'var(--muted2)':'var(--warn)'}

/* ============ NOTES ============ */
let noteFilter={q:'',folder:'all'};
function mkNote(o={}){return Object.assign({id:uid(),title:'',text:'',tags:[],color:'',pinned:false,locked:false,password:'',folder:'',created:Date.now(),updated:Date.now()},o)}
function renderNotes(){
  const u=U();
  const folders=u.folders;
  let notes=u.notes.filter(n=>{
    if(noteFilter.folder!=='all'&&(n.folder||'')!==noteFilter.folder)return false;
    if(noteFilter.q){const q=noteFilter.q.toLowerCase();return (n.title||'').toLowerCase().includes(q)||(n.text||'').toLowerCase().includes(q)||(n.tags||[]).join(' ').toLowerCase().includes(q)}
    return true;
  }).sort((a,b)=>(b.pinned-a.pinned)||((b.updated||0)-(a.updated||0)));
  $('view').innerHTML=`
  <div class="toolbar">
    <div class="search"><span class="mag">🔍</span><input id="nsearch" placeholder="Search notes, tags…" value="${esc(noteFilter.q)}"></div>
    <button class="btn gold" id="newNote">📝 New note</button>
    <button class="btn" id="newFolder">📁 New folder</button>
  </div>
  <div class="chips">
    <button class="chip ${noteFilter.folder==='all'?'on':''}" data-f="all">All notes</button>
    ${folders.map(f=>`<button class="chip ${noteFilter.folder===f.name?'on':''}" data-f="${esc(f.name)}">📁 ${esc(f.name)} <span style="opacity:.6">${u.notes.filter(n=>n.folder===f.name).length}</span></button>`).join('')}
  </div>
  <div class="cards">
    ${notes.length?notes.map(n=>noteCard(n)).join(''):emptyState('🗒️','Nothing here yet','Create a note or pick another folder.')}
  </div>`;
  $('nsearch').addEventListener('input',e=>{noteFilter.q=e.target.value;renderNotes();const i=$('nsearch');i.focus();i.setSelectionRange(i.value.length,i.value.length)});
  $('newNote').onclick=async()=>{const n=mkNote({title:'Untitled note',folder:noteFilter.folder!=='all'?noteFilter.folder:''});u.notes.push(n);save();openNote(n.id)};
  $('newFolder').onclick=async()=>{const r=await modal({title:'New folder',fields:[{key:'name',label:'Folder name',placeholder:'Ideas'}],confirm:'Create'});if(r&&r.name.trim()){u.folders.push({id:uid(),name:r.name.trim()});save();toast('Folder created');renderNotes()}};
  document.querySelectorAll('.chip[data-f]').forEach(c=>c.onclick=()=>{noteFilter.folder=c.dataset.f;renderNotes()});
}
function noteCard(n){
  const snip=(n.text||'').replace(/[#*`>\-]/g,'').slice(0,150)||'Empty note';
  return `<div class="glass ncard" style="--cc:${esc(n.color||'var(--accent)')}" onclick="openNote('${n.id}')">
    ${n.pinned?'<span class="pin">📌</span>':''}
    <div class="ic">${n.locked?'🔒':'📝'}</div>
    <h4>${esc(n.title||'Untitled')}</h4>
    <p>${n.locked?'<i style="opacity:.6">Locked — tap to unlock</i>':esc(snip)}</p>
    <div class="ft">
      ${(n.tags||[]).slice(0,2).map(t=>`<span class="ntag">#${esc(t)}</span>`).join('')}
      <span style="margin-left:auto">${n.folder?'📁 '+esc(n.folder)+' · ':''}${timeAgo(n.updated)}</span>
    </div>
  </div>`;
}
let edMode='write';
async function openNote(id){
  const u=U(),n=u.notes.find(x=>x.id===id);if(!n)return;
  if(n.locked){const r=await modal({title:'Locked note',desc:'Enter the password to open this note.',fields:[{key:'p',label:'Password',type:'password'}],confirm:'Unlock'});if(!r||r.p!==n.password)return toast('Wrong password','bad')}
  $('tbEb').textContent='Notes';$('tbTitle').textContent='Editing';
  $('view').innerHTML=`
  <div class="row" style="margin-bottom:16px">
    <button class="btn ghost sm" onclick="go('notes')">← Back</button>
    <div class="seg" style="margin-left:auto"><button id="mWrite" class="${edMode==='write'?'on':''}">Write</button><button id="mPrev" class="${edMode==='preview'?'on':''}">Preview</button></div>
  </div>
  <div class="glass pad editor">
    <input class="ed-title" id="edTitle" value="${esc(n.title)}" placeholder="Note title">
    <div class="meta-row">
      <input id="edTags" value="${esc((n.tags||[]).join(', '))}" placeholder="tags, comma, separated">
      <select id="edFolder">${['',...u.folders.map(f=>f.name)].map(f=>`<option value="${esc(f)}" ${f===(n.folder||'')?'selected':''}>${f?'📁 '+esc(f):'No folder'}</option>`).join('')}</select>
      <select id="edColor">${[['','Default'],['#E8C158','Gold'],['#5ec98a','Green'],['#46d3e6','Cyan'],['#f06f9c','Pink'],['#a78bfa','Violet']].map(c=>`<option value="${c[0]}" ${c[0]===(n.color||'')?'selected':''}>${c[1]}</option>`).join('')}</select>
    </div>
    <div id="edWrap">
      <textarea class="ed-body mono" id="edBody" placeholder="Start writing… markdown supported (# heading, **bold**, - list, \`code\`)">${esc(n.text)}</textarea>
      <div class="preview glass" id="edPrev" style="display:none"></div>
    </div>
    <div class="row">
      <span style="font-size:12px;color:var(--muted2)" id="wc"></span>
      <div class="row" style="margin-left:auto">
        <button class="btn sm" id="btnPin">${n.pinned?'📌 Unpin':'📌 Pin'}</button>
        <button class="btn sm" id="btnLock">${n.locked?'🔓 Unlock':'🔒 Lock'}</button>
        <button class="btn sm danger" id="btnDel">🗑 Delete</button>
        <button class="btn gold sm" id="btnSave">💾 Save</button>
      </div>
    </div>
  </div>`;
  const body=$('edBody'),wc=$('wc');
  const updWc=()=>{const t=body.value.trim();wc.textContent=`${t?t.split(/\s+/).length:0} words · ${body.value.length} chars`};updWc();
  body.addEventListener('input',updWc);
  const setMode=m=>{edMode=m;$('mWrite').classList.toggle('on',m==='write');$('mPrev').classList.toggle('on',m==='preview');
    $('edBody').style.display=m==='write'?'block':'none';$('edPrev').style.display=m==='preview'?'block':'none';
    if(m==='preview')$('edPrev').innerHTML=md(body.value)};
  $('mWrite').onclick=()=>setMode('write');$('mPrev').onclick=()=>setMode('preview');
  if(edMode==='preview')setMode('preview');
  const persist=()=>{n.title=$('edTitle').value||'Untitled';n.text=body.value;
    n.tags=$('edTags').value.split(',').map(s=>s.trim()).filter(Boolean);
    n.folder=$('edFolder').value;n.color=$('edColor').value;n.updated=Date.now();save()};
  $('btnSave').onclick=()=>{persist();toast('Note saved')};
  $('btnPin').onclick=()=>{n.pinned=!n.pinned;save();openNote(id)};
  $('btnDel').onclick=async()=>{if(await confirmModal('Delete note?','This can\'t be undone.')){u.notes=u.notes.filter(x=>x.id!==id);save();toast('Note deleted');go('notes')}};
  $('btnLock').onclick=async()=>{
    if(n.locked){n.locked=false;n.password='';save();toast('Note unlocked');openNote(id)}
    else{const r=await modal({title:'Lock note',desc:'Set a password. (Stored locally, not encrypted — for casual privacy only.)',fields:[{key:'p',label:'Password',type:'password'}],confirm:'Lock'});if(r&&r.p){n.locked=true;n.password=r.p;persist();toast('Note locked');go('notes')}}
  };
}
function md(src){
  let s=esc(src);
  s=s.replace(/```([\s\S]*?)```/g,(m,c)=>`<pre><code>${c.replace(/^\n/,'')}</code></pre>`);
  s=s.replace(/^### (.*)$/gm,'<h3>$1</h3>').replace(/^## (.*)$/gm,'<h2>$1</h2>').replace(/^# (.*)$/gm,'<h1>$1</h1>');
  s=s.replace(/^&gt; (.*)$/gm,'<blockquote>$1</blockquote>');
  s=s.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>').replace(/\*([^*]+)\*/g,'<i>$1</i>');
  s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
  s=s.replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  s=s.replace(/(?:^|\n)((?:[-*] .*(?:\n|$))+)/g,(m,l)=>'\n<ul>'+l.trim().split('\n').map(x=>'<li>'+x.replace(/^[-*] /,'')+'</li>').join('')+'</ul>');
  s=s.replace(/(?:^|\n)((?:\d+\. .*(?:\n|$))+)/g,(m,l)=>'\n<ol>'+l.trim().split('\n').map(x=>'<li>'+x.replace(/^\d+\. /,'')+'</li>').join('')+'</ol>');
  s=s.split(/\n{2,}/).map(b=>/^\s*<(h\d|ul|ol|pre|blockquote)/.test(b)?b:`<p>${b.replace(/\n/g,'<br>')}</p>`).join('');
  return s;
}

  // pomodoro
  drawPomo();

  // calc
  buildCalc();

  $('addCounter').onclick=async()=>{const r=await modal({title:'New counter',fields:[{key:'name',label:'Name',placeholder:'Push-ups'}],confirm:'Add'});if(r&&r.name.trim()){u.counters.push({id:uid(),name:r.name.trim(),value:0});save();renderTools()}};

function fmt(s){const m=Math.floor(s/60),x=s%60;return `${String(m).padStart(2,'0')}:${String(x).padStart(2,'0')}`}
function drawPomo(){const t=$('ptime');if(t)t.textContent=fmt(pomo.left);const r=$('pring');if(r){const total=POMO_MODES[pomo.mode];r.style.strokeDashoffset=477*(1-pomo.left/total)}}
function startPomo(){pomo.running=true;pomo.timer=setInterval(()=>{pomo.left--;if(pomo.left<=0){stopPomo();pomo.left=POMO_MODES[pomo.mode];toast('Timer done! ⏰','warn');try{new AudioContext()}catch(e){}if(TAB==='tools')renderTools()}drawPomo()},1000)}
function stopPomo(){pomo.running=false;clearInterval(pomo.timer)}
let calc={cur:'0',prev:null,op:null,fresh:true};
function buildCalc(){
  const keys=['C','±','%','÷','7','8','9','×','4','5','6','−','1','2','3','+','0','.','='];
  const g=$('calcGrid');if(!g)return;
  g.innerHTML=keys.map(k=>{
    const op=['÷','×','−','+'].includes(k),eq=k==='=';
    return `<button class="${op?'op':''}${eq?'eq':''}${k==='0'?' wide':''}" data-k="${k}">${k}</button>`;
  }).join('');
  g.querySelectorAll('button').forEach(b=>b.onclick=()=>calcPress(b.dataset.k));
}
function calcPress(k){
  const scr=$('calcScr');
  if(k==='C'){calc={cur:'0',prev:null,op:null,fresh:true}}
  else if(k==='±'){calc.cur=String(parseFloat(calc.cur)*-1)}
  else if(k==='%'){calc.cur=String(parseFloat(calc.cur)/100)}
  else if(['÷','×','−','+'].includes(k)){if(calc.op&&!calc.fresh)calcEq();calc.prev=parseFloat(calc.cur);calc.op=k;calc.fresh=true}
  else if(k==='='){calcEq()}
  else if(k==='.'){if(!calc.cur.includes('.'))calc.cur+='.';calc.fresh=false}
  else{calc.cur=(calc.fresh||calc.cur==='0')?k:calc.cur+k;calc.fresh=false}
  if(scr)scr.textContent=calc.cur;
}
function calcEq(){if(calc.op===null||calc.prev===null)return;const a=calc.prev,b=parseFloat(calc.cur);let r=a;
  if(calc.op==='+')r=a+b;if(calc.op==='−')r=a-b;if(calc.op==='×')r=a*b;if(calc.op==='÷')r=b?a/b:0;
  calc.cur=String(Math.round(r*1e10)/1e10);calc.op=null;calc.prev=null;calc.fresh=true}
function bump(id,d){const c=U().counters.find(x=>x.id===id);if(c){c.value+=d;save();renderTools()}}
function resetCounter(id){const c=U().counters.find(x=>x.id===id);if(c){c.value=0;save();renderTools()}}
async function delCounter(id){if(await confirmModal('Delete counter?','')){U().counters=U().counters.filter(x=>x.id!==id);save();renderTools()}}

let cmdSel=0,cmdItems=[];
function openCmd(){
  const ov=document.createElement('div');ov.className='cmdk';ov.id='cmdk';
  ov.innerHTML=`<div class="glass cmdk-box">
    <div class="cmdk-in"><span>🔍</span><input id="cmdkIn" placeholder="Search notes, tasks, links — or type a command…"></div>
    <div class="cmdk-list" id="cmdkList"></div></div>`;
  document.body.appendChild(ov);
  const inp=$('cmdkIn');inp.focus();
  const render=q=>{
    cmdItems=buildCmd(q);cmdSel=0;
    let html='',lastCat='';
    cmdItems.forEach((it,i)=>{if(it.cat!==lastCat){html+=`<div class="cmdk-cat">${it.cat}</div>`;lastCat=it.cat}
      html+=`<div class="cmdk-item ${i===cmdSel?'sel':''}" data-i="${i}"><span class="ci">${it.icon}</span><div class="ct"><div class="a">${esc(it.title)}</div>${it.sub?`<div class="b">${esc(it.sub)}</div>`:''}</div>${it.k?`<span class="k">${it.k}</span>`:''}</div>`});
    $('cmdkList').innerHTML=html||'<div class="empty" style="padding:24px">No matches</div>';
    $('cmdkList').querySelectorAll('.cmdk-item').forEach(el=>el.onclick=()=>runCmd(cmdItems[+el.dataset.i]));
  };
  render('');
  inp.addEventListener('input',()=>render(inp.value));
  ov.addEventListener('keydown',e=>{
    if(e.key==='Escape')closeCmd();
    if(e.key==='ArrowDown'){e.preventDefault();cmdSel=Math.min(cmdSel+1,cmdItems.length-1);highlight()}
    if(e.key==='ArrowUp'){e.preventDefault();cmdSel=Math.max(cmdSel-1,0);highlight()}
    if(e.key==='Enter'&&cmdItems[cmdSel])runCmd(cmdItems[cmdSel]);
  });
  ov.onclick=e=>{if(e.target===ov)closeCmd()};
}

    {icon:'🌐',title:'Go to Code Lab',cat:'Navigate',run:()=>go('code')},
    {icon:'🧰',title:'Go to Tools',cat:'Navigate',run:()=>go('tools')},
    {icon:'⚙️',title:'Go to Settings',cat:'Navigate',run:()=>go('settings')},
  ];
  cmds.filter(c=>!q||c.title.toLowerCase().includes(q)).forEach(c=>out.push(c));
  u.notes.filter(n=>!q||(n.title||'').toLowerCase().includes(q)||(n.text||'').toLowerCase().includes(q)).slice(0,6)
    .forEach(n=>out.push({icon:n.locked?'🔒':'📝',title:n.title||'Untitled',sub:'Note · '+timeAgo(n.updated),cat:'Notes',run:()=>openNote(n.id)}));
  u.tasks.filter(t=>!q||t.title.toLowerCase().includes(q)).slice(0,5)
    .forEach(t=>out.push({icon:'✅',title:t.title,sub:'Task · '+t.status,cat:'Tasks',run:()=>go('tasks')}));
  u.links.filter(l=>!q||l.title.toLowerCase().includes(q)).slice(0,5)
    .forEach(l=>out.push({icon:l.icon||'🔗',title:l.title,sub:l.url,cat:'Links',run:()=>window.open(l.url,'_blank')}));
  return out;
}
function runCmd(it){closeCmd();it.run()}

/* ============ GLOBAL KEYS ============ */
$('cmdBtn').onclick=openCmd;
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault();if($('cmdk'))closeCmd();else if($('app').style.display!=='none')openCmd()}
});

/* expose for inline handlers */
Object.assign(window,{go,openNote,moveTask,editTask,delTask,bump,resetCounter,delCounter,delLink});

/* ============ BOOT ============ */
if(user&&DB.users[user])enterApp();else{user=null;showLogin()}
</script>
</body>
</html>
