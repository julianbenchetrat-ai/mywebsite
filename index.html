<!DOCTYPE html>
<html>
<head>
<title>Gold Lobby Hub FIXED</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(120deg,#000,#111,#000);
overflow:hidden;
}

body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle,#ffd70022 10%,transparent 40%);
animation:move 6s linear infinite;
}

@keyframes move{
0%{transform:translate(-25%,-25%)}
50%{transform:translate(0%,0%)}
100%{transform:translate(-25%,-25%)}
}

.card{
position:relative;
z-index:2;
background:#0b0b0b;
border:1px solid #ffd70055;
box-shadow:0 0 20px #ffd70033;
padding:20px;
border-radius:15px;
width:420px;
text-align:center;
}

h2{color:#ffd700}

input,textarea{
width:90%;
padding:8px;
margin:5px;
border:none;
border-radius:8px;
background:#111;
color:white;
}

textarea{height:60px;resize:none}

button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
background:#ffd700;
color:black;
font-weight:bold;
}

.note{
background:#111;
border:1px solid #333;
padding:8px;
margin:6px 0;
border-radius:8px;
position:relative;
}

.close{
position:absolute;
top:5px;
right:8px;
background:red;
color:white;
border:none;
border-radius:50%;
width:22px;
height:22px;
cursor:pointer;
}

.nav button{width:30%}
</style>
</head>

<body>

<div id="app"></div>

<script>
let db = JSON.parse(localStorage.getItem("db")||"{}");
let user = localStorage.getItem("u");

function saveDB(){
localStorage.setItem("db",JSON.stringify(db));
}

// ---------- LOGIN ----------
function loginUI(msg=""){
app.innerHTML=`
<div class="card">
<h2>🔐 GOLD HUB LOGIN</h2>

<input id="u" placeholder="username">
<input id="p" type="password" placeholder="password">

<div style="color:red;font-size:12px">${msg}</div>

<button onclick="login()">Enter Hub</button>
</div>`;
}

function login(){
let u=document.getElementById("u").value.trim();
let p=document.getElementById("p").value;

if(!u||!p)return loginUI("Fill everything");

// ❌ PREVENT DUPLICATE USERNAMES (same name but different password)
if(db[u] && db[u].pass !== p){
return loginUI("❌ Username already exists with a different password");
}

// CREATE USER IF NEW
if(!db[u]){
db[u]={pass:p,notes:[]};
}

if(db[u].pass!==p){
return loginUI("Wrong password ❌");
}

user=u;
localStorage.setItem("u",user);

saveDB();
welcome();
}

// ---------- WELCOME SCREEN ----------
function welcome(){
app.innerHTML=`
<div class="card">
<h2>👋 Hello, ${user}</h2>
<button onclick="lobby()">Enter Lobby</button>
</div>`;
}

// ---------- LOBBY ----------
function lobby(){
app.innerHTML=`
<div class="card">
<h2>👑 GOLD LOBBY</h2>

<div class="nav">
<button onclick="show('games')">🎮 Games</button>
<button onclick="show('movies')">🎬 Movies</button>
<button onclick="show('notes')">📝 Notes</button>
</div>

<div id="view"></div>

<button onclick="save()">💾 Save</button>
<button onclick="logout()">🚪 Logout</button>
</div>`;

show("notes");
}

// ---------- VIEW ----------
function show(type){
let v=document.getElementById("view");

if(type==="games"){
v.innerHTML=`<h3>🎮 Games</h3><p>Coming soon...</p>`;
}

if(type==="movies"){
v.innerHTML=`<h3>🎬 Movies</h3><p>Coming soon...</p>`;
}

if(type==="notes"){
let notes=db[user].notes;

v.innerHTML=`
<h3>📝 Notes</h3>
<button onclick="addNote()">+ Add Note</button>
<div id="box"></div>
`;

let box=document.getElementById("box");
box.innerHTML="";

notes.forEach((n,i)=>{
box.innerHTML+=`
<div class="note">
<button class="close" onclick="del(${i})">x</button>

<input value="${n.title}" oninput="rename(${i},this.value)">
<textarea oninput="edit(${i},this.value)">${n.text}</textarea>
</div>`;
});
}
}

// ---------- NOTES ----------
function addNote(){
db[user].notes.push({title:"New Note",text:""});
saveDB();
show("notes");
}

function edit(i,val){
db[user].notes[i].text=val;
saveDB();
}

function rename(i,val){
db[user].notes[i].title=val;
saveDB();
}

function del(i){
db[user].notes.splice(i,1);
saveDB();
show("notes");
}

// ---------- SAVE ----------
function save(){
saveDB();
alert("💾 Saved!");
}

// ---------- LOGOUT ----------
function logout(){
localStorage.removeItem("u");
user=null;
loginUI();
}

// ---------- START ----------
user ? welcome() : loginUI();
</script>

</body>
</html>
