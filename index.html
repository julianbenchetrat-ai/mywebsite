<script>
function login() {

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;

    if (username === "" || password === "") {
        document.getElementById("status").innerText =
            "Enter a username and password.";
        return;
    }

    const savedUser = localStorage.getItem("hubUser");
    const savedPass = localStorage.getItem("hubPass");

    // First time visiting: create account
    if (savedUser === null) {

        localStorage.setItem("hubUser", username);
        localStorage.setItem("hubPass", password);

        document.getElementById("status").innerText =
            "✅ Account created!";

        showHub();
        return;
    }

    // Existing account: check password
    if (username === savedUser && password === savedPass) {

        showHub();

    } else {

        document.getElementById("status").innerText =
            "❌ Wrong username or password";

    }
}

function showHub() {

    document.getElementById("login").style.display = "none";
    document.getElementById("hub").style.display = "block";

    document.getElementById("userDisplay").innerText =
        localStorage.getItem("hubUser");

    document.getElementById("notes").value =
        localStorage.getItem("hubNotes") || "";
}

function saveNotes() {

    localStorage.setItem(
        "hubNotes",
        document.getElementById("notes").value
    );

    alert("Notes Saved!");
}

function logout() {

    location.reload();
}

window.onload = function() {

    document.getElementById("hub").style.display = "none";
    document.getElementById("login").style.display = "block";

    if (localStorage.getItem("hubUser")) {

        document.getElementById("status").innerText =
            "Enter your username and password.";
    }
}
</script>
