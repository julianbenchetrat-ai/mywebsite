<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gold Hub V9.1</title>
<style>
body{font-family:Segoe UI,sans-serif;background:#050505;color:white;margin:0}
.login{max-width:420px;margin:10vh auto;padding:25px;background:#111;border:1px solid gold;border-radius:20px}
input,textarea{width:100%;padding:10px;margin:8px 0;background:#1a1a1a;color:white;border:1px solid #333;border-radius:10px}
button{padding:10px 14px;background:gold;border:none;border-radius:10px;font-weight:bold;cursor:pointer}
</style>
</head>
<body>
<div id="app"></div>
<script>
const app=document.getElementById('app');
let db=JSON.parse(localStorage.getItem('ghv91')||'{}');
let user=localStorage.getItem('ghv91user');

function save(){localStorage.setItem('ghv91',JSON.stringify(db));}

function loginUI(msg=''){
app.innerHTML=`<div class="login">
<h1>👑 Gold Hub V9.1</h1>
<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Password">
<div style="color:#ff7777">${msg}</div><br>
<button onclick="login()">Login / Create Account</button>
</div>`;
}

function login(){
let u = document.getElementById('u').value.trim();
let p = document.getElementById('p').value;

if(!u || !p){ loginUI('Fill everything'); return; }

if(!db[u]){
  db[u]={pass:p,notes:[]};
}

if(db[u].pass !== p){
  loginUI('Wrong password');
  return;
}

user=u;
localStorage.setItem('ghv91user',u);
save();
dashboard();
}

function dashboard(){
app.innerHTML=`<div style="padding:20px">
<h1>👑 Welcome ${user}</h1>
<p>Login is working correctly now.</p>
<button onclick="logout()">Logout</button>
</div>`;
}

function logout(){
localStorage.removeItem('ghv91user');
location.reload();
}

user ? dashboard() : loginUI();
</script>
</body>
</html>
