<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gold Hub Dashboard V2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Segoe UI,sans-serif;
background:#070707;
color:#fff;
overflow:hidden;
}
.bg{
position:fixed;inset:0;
background:
radial-gradient(circle at 20% 20%,rgba(255,200,80,.15),transparent 25%),
radial-gradient(circle at 80% 30%,rgba(255,200,80,.12),transparent 20%),
radial-gradient(circle at 50% 80%,rgba(255,200,80,.1),transparent 25%);
animation:float 12s ease-in-out infinite;
}
@keyframes float{50%{transform:scale(1.08) translateY(-15px)}}

.sidebar{
position:fixed;left:0;top:0;width:90px;height:100%;
background:#101010;border-right:1px solid #3b321a;
display:flex;flex-direction:column;align-items:center;padding:20px 0;gap:18px;
}
.icon{
width:50px;height:50px;border-radius:15px;
display:flex;align-items:center;justify-content:center;
background:#181818;color:#f2c46d;cursor:pointer;
border:1px solid #4a3a18;
}
.icon:hover{box-shadow:0 0 20px rgba(255,215,0,.3)}
.main{
margin-left:90px;height:100vh;padding:20px;overflow:auto;
}
.top{
background:#121212;border:1px solid #4a3a18;
padding:20px;border-radius:24px;margin-bottom:20px;
box-shadow:0 0 25px rgba(255,215,0,.08);
}
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
}
.card{
background:#121212;
border:1px solid #4a3a18;
border-radius:24px;
padding:20px;
min-height:220px;
box-shadow:0 0 20px rgba(255,215,0,.05);
}
.gold{color:#f2c46d}
button{
background:linear-gradient(135deg,#f2c46d,#c9962f);
border:none;padding:10px 14px;border-radius:12px;
cursor:pointer;font-weight:bold;
}
input,textarea{
width:100%;margin-top:8px;padding:10px;
background:#1b1b1b;color:white;border:1px solid #333;
border-radius:10px;
}
.note{margin-top:10px;padding:10px;background:#181818;border-radius:12px}
.login{
width:420px;margin:10vh auto;background:#121212;padding:25px;
border-radius:24px;border:1px solid #4a3a18;
}
</style>
</head>
<body>
<div class="bg"></div>
<div id="app"></div>

<script>
let db=JSON.parse(localStorage.getItem("db")||"{}");
let user=localStorage.getItem("u");
const app=document.getElementById("app");
function saveDB(){localStorage.setItem("db",JSON.stringify(db));}

function loginUI(msg=""){
app.innerHTML=`<div class="login">
<h1 class="gold">👑 Gold Hub V2</h1><br>
<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Password">
<p style="color:#ff8888">${msg}</p><br>
<button onclick="login()">Enter</button>
</div>`;
}
function login(){
let u=u=document.getElementById('u').value.trim();
let p=document.getElementById('p').value;
if(!u||!p)return loginUI("Fill everything");
if(!db[u]) db[u]={pass:p,notes:[]};
if(db[u].pass!==p) return loginUI("Wrong password");
user=u; localStorage.setItem("u",u); saveDB(); dashboard();
}
function dashboard(){
app.innerHTML=`
<div class="sidebar">
<div class="icon" onclick="show('home')">🏠</div>
<div class="icon" onclick="show('games')">🎮</div>
<div class="icon" onclick="show('movies')">🎬</div>
<div class="icon" onclick="show('notes')">📝</div>
<div class="icon" onclick="logout()">🚪</div>
</div>
<div class="main">
<div class="top">
<h1 class="gold">Welcome Back, ${user}</h1>
<p>Luxury Gold Dashboard</p>
</div>
<div id="view"></div>
</div>`;
show('home');
}
function show(tab){
let v=document.getElementById("view");
if(tab==='home'){
v.innerHTML=`<div class="grid">
<div class="card"><h2 class="gold">🎮 Games</h2><br><p>Launch your favorite games.</p></div>
<div class="card"><h2 class="gold">🎬 Movies</h2><br><p>Your media collection.</p></div>
<div class="card"><h2 class="gold">📊 Stats</h2><br><h1>1025</h1><p>Hub Score</p></div>
<div class="card"><h2 class="gold">🪙 Gold</h2><br><h1>8,329</h1></div>
<div class="card"><h2 class="gold">📝 Notes</h2><br><p>${db[user].notes.length} saved notes</p></div>
<div class="card"><h2 class="gold">⚙️ Controls</h2><br><button onclick="saveDB()">Save</button></div>
</div>`;
}
if(tab==='games'){
v.innerHTML=`<div class="card"><h2 class="gold">🎮 Games</h2><br>🥊 Fighting Game<br>🌋 Lava Escape<br>🎯 Target Challenge</div>`;
}
if(tab==='movies'){
v.innerHTML=`<div class="card"><h2 class="gold">🎬 Movies</h2><br>🚀 Sci‑Fi<br>🦖 Adventure<br>🦸 Heroes</div>`;
}
if(tab==='notes'){
let html=`<div class="card"><h2 class="gold">📝 Notes</h2><br><button onclick="addNote()">+ Add Note</button>`;
db[user].notes.forEach((n,i)=>{
html+=`<div class="note">
<input value="${(n.title||'').replace(/"/g,'&quot;')}" oninput="renameNote(${i},this.value)">
<textarea oninput="editNote(${i},this.value)">${n.text||''}</textarea>
<button onclick="delNote(${i})">Delete</button>
</div>`;
});
html+="</div>";
v.innerHTML=html;
}
}
function addNote(){db[user].notes.push({title:'New Note',text:''});saveDB();show('notes');}
function renameNote(i,v){db[user].notes[i].title=v;saveDB();}
function editNote(i,v){db[user].notes[i].text=v;saveDB();}
function delNote(i){db[user].notes.splice(i,1);saveDB();show('notes');}
function logout(){localStorage.removeItem('u');user=null;loginUI();}
user?dashboard():loginUI();
</script>
</body>
</html>
