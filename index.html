<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gold Hub Dashboard</title>
<style>
*{box-sizing:border-box}
body{
margin:0;font-family:Segoe UI,Arial,sans-serif;color:#fff;
background:#050505;overflow:hidden
}
body:before{
content:"";position:fixed;inset:-30%;
background:
radial-gradient(circle at 20% 20%,rgba(255,215,0,.18),transparent 20%),
radial-gradient(circle at 80% 40%,rgba(255,215,0,.12),transparent 20%),
radial-gradient(circle at 50% 80%,rgba(255,215,0,.15),transparent 25%);
animation:float 12s ease-in-out infinite;
}
@keyframes float{50%{transform:translate(-5%,-5%) scale(1.1)}}

#app{position:relative;z-index:1;width:100vw;height:100vh}

.login{
width:420px;margin:10vh auto;padding:25px;border-radius:24px;
background:rgba(15,15,15,.8);backdrop-filter:blur(12px);
border:1px solid rgba(255,215,0,.3);
box-shadow:0 0 30px rgba(255,215,0,.15);
text-align:center;
}
h1,h2{color:#ffd700}
input,textarea{
width:100%;padding:12px;margin:8px 0;border-radius:12px;
border:1px solid #333;background:#111;color:#fff
}
button{
padding:12px 16px;border:none;border-radius:12px;cursor:pointer;
background:linear-gradient(135deg,#ffd700,#caa400);font-weight:700;
}
.sidebar{
position:absolute;left:0;top:0;width:230px;height:100%;
background:rgba(10,10,10,.95);border-right:1px solid rgba(255,215,0,.25);
padding:20px
}
.main{
margin-left:230px;height:100%;padding:20px;overflow:auto
}
.card,.tile,.note{
background:rgba(20,20,20,.8);
border:1px solid rgba(255,215,0,.2);
border-radius:18px;padding:15px;
}
.tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:15px}
.tile:hover,.note:hover{transform:translateY(-2px)}
.note{position:relative;margin:10px 0}
.close{
position:absolute;right:8px;top:8px;width:24px;height:24px;
background:#d33;color:#fff;border-radius:50%;padding:0
}
.small{opacity:.7;font-size:13px}
</style>
</head>
<body>
<div id="app"></div>
<script>
const app=document.getElementById("app");
let db=JSON.parse(localStorage.getItem("db")||"{}");
let user=localStorage.getItem("u");

function saveDB(){localStorage.setItem("db",JSON.stringify(db));}

function loginUI(msg=""){
app.innerHTML=`<div class="login">
<h1>👑 GOLD HUB</h1>
<input id=u placeholder="Username">
<input id=p type=password placeholder="Password">
<div style="color:#ff6666">${msg}</div>
<button onclick="login()">Enter Hub</button>
</div>`;
}

function login(){
let u=document.getElementById('u').value.trim();
let p=document.getElementById('p').value;
if(!u||!p)return loginUI("Fill everything");

if(!db[u]) db[u]={pass:p,notes:[]};
if(db[u].pass!==p) return loginUI("❌ Wrong password");

user=u;
localStorage.setItem("u",u);
saveDB();
welcome();
}

function welcome(){
app.innerHTML=`<div class="login">
<h1>👋 Welcome Back, ${user}</h1>
<p class="small">Luxury Gold Dashboard Ready</p>
<button onclick="dashboard()">Enter Dashboard</button>
</div>`;
}

function dashboard(){
app.innerHTML=`
<div class="sidebar">
<h2>👑 Gold Hub</h2>
<button onclick="show('home')">🏠 Home</button><br><br>
<button onclick="show('games')">🎮 Games</button><br><br>
<button onclick="show('movies')">🎬 Movies</button><br><br>
<button onclick="show('notes')">📝 Notes</button><br><br>
<button onclick="save()">💾 Save</button><br><br>
<button onclick="logout()">🚪 Logout</button>
</div>
<div class="main"><div id="view"></div></div>`;
show('home');
}

function show(tab){
const v=document.getElementById('view');

if(tab==='home'){
v.innerHTML=`<div class="card"><h2>Hello, ${user}</h2><p>Welcome to your luxury dashboard.</p></div>`;
}

if(tab==='games'){
v.innerHTML=`<h2>🎮 Games</h2><div class="tiles">
<div class="tile">🥊 Fighting Game</div>
<div class="tile">🌋 Lava Escape</div>
<div class="tile">🎯 Target Challenge</div>
</div>`;
}

if(tab==='movies'){
v.innerHTML=`<h2>🎬 Movies</h2><div class="tiles">
<div class="tile">🚀 Sci‑Fi Collection</div>
<div class="tile">🦖 Adventure Collection</div>
<div class="tile">🦸 Hero Collection</div>
</div>`;
}

if(tab==='notes'){
let html=`<h2>📝 Notes</h2><button onclick="addNote()">+ Add Note</button>`;
db[user].notes.forEach((n,i)=>{
html+=`<div class="note">
<button class="close" onclick="delNote(${i})">×</button>
<input value="${(n.title||'').replace(/"/g,'&quot;')}" oninput="renameNote(${i},this.value)">
<textarea oninput="editNote(${i},this.value)">${n.text||''}</textarea>
</div>`;
});
v.innerHTML=html;
}
}

function addNote(){db[user].notes.push({title:"New Note",text:""});saveDB();show('notes');}
function editNote(i,v){db[user].notes[i].text=v;saveDB();}
function renameNote(i,v){db[user].notes[i].title=v;saveDB();}
function delNote(i){db[user].notes.splice(i,1);saveDB();show('notes');}

function save(){saveDB();alert("Saved!");}
function logout(){localStorage.removeItem("u");user=null;loginUI();}

user?welcome():loginUI();
</script>
</body>
</html>
