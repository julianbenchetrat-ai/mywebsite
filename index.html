<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gold Hub V7</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Segoe UI,Arial,sans-serif;background:#050505;color:#fff;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:
radial-gradient(circle at 20% 20%,rgba(255,215,0,.15),transparent 25%),
radial-gradient(circle at 80% 30%,rgba(255,215,0,.1),transparent 25%);
pointer-events:none}
.sidebar{position:fixed;left:0;top:0;width:90px;height:100%;background:#0f0f0f;border-right:1px solid #333;padding-top:20px}
.icon{width:56px;height:56px;margin:10px auto;border-radius:18px;background:#181818;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.25s}
.icon:hover,.active{box-shadow:0 0 20px rgba(255,215,0,.5);border:1px solid gold}
.main{margin-left:90px;height:100vh;overflow:auto;padding:20px}
.glass{background:rgba(20,20,20,.8);backdrop-filter:blur(18px);border:1px solid rgba(255,215,0,.2);border-radius:24px}
.hero,.card{padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px}
button{padding:10px 14px;border:none;border-radius:12px;background:gold;font-weight:bold;cursor:pointer}
input,textarea{width:100%;padding:10px;margin-top:8px;background:#151515;color:white;border:1px solid #333;border-radius:12px}
.tile{padding:15px;text-align:center;cursor:pointer}
.folder{min-height:120px}
.note{min-height:120px}
iframe{width:100%;height:400px;border:none;background:#fff;border-radius:12px}
.search{margin-bottom:12px}
.clock{font-size:28px;color:gold;font-weight:bold}
</style>
</head>
<body>
<div id="app"></div>
<script>
const app=document.getElementById('app');
let db=JSON.parse(localStorage.getItem('ghv7')||'{}');
let user=localStorage.getItem('ghuser7');

function save(){localStorage.setItem('ghv7',JSON.stringify(db));}

function loginUI(msg=''){
app.innerHTML=`<div class="glass" style="max-width:450px;margin:8vh auto;padding:25px">
<h1 style="color:gold">👑 GOLD HUB V7</h1><br>
<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Password"><br><br>
<div style="color:#ff7777">${msg}</div><br>
<button onclick="login()">Enter</button>
</div>`;
}

function login(){
let u=document.getElementById('u').value.trim();
let p=document.getElementById('p').value;
if(!u||!p)return loginUI('Fill everything');
if(!db[u])db[u]={pass:p,notes:[],folders:[],projects:[]};
if(db[u].pass!==p)return loginUI('Wrong password');
user=u;localStorage.setItem('ghuser7',u);save();dashboard();
}

function dashboard(){
app.innerHTML=`
<div class="sidebar">
<div class="icon active" onclick="setTab(this);home()">🏠</div>
<div class="icon" onclick="setTab(this);notes()">📝</div>
<div class="icon" onclick="setTab(this);htmlPlayer()">🌐</div>
<div class="icon" onclick="setTab(this);logout()">🚪</div>
</div>
<div class="main"><div id="view"></div></div>`;
home();
}

function setTab(el){
document.querySelectorAll('.icon').forEach(i=>i.classList.remove('active'));
el.classList.add('active');
}

function home(){
let notesCount=db[user].notes.length;
let foldersCount=db[user].folders.length;
let locked=db[user].notes.filter(n=>n.locked).length;

view.innerHTML=`
<div class="glass hero">
<h1>👋 Welcome ${user}</h1>
<div class="clock" id="clock"></div>
</div><br>
<div class="grid">
<div class="glass card">📝 Notes<br><h1>${notesCount}</h1></div>
<div class="glass card">📁 Folders<br><h1>${foldersCount}</h1></div>
<div class="glass card">🔒 Locked Notes<br><h1>${locked}</h1></div>
<div class="glass card">🌐 Projects<br><h1>${db[user].projects.length}</h1></div>
</div>`;
clock();
}

function clock(){
let e=document.getElementById('clock');
if(!e)return;
function tick(){e.textContent=new Date().toLocaleTimeString();}
tick();setInterval(tick,1000);
}

function notes(){
let h=`<div class="glass card">
<h2>📝 Notes Manager</h2><br>
<input class="search" placeholder="Search notes..." oninput="searchNotes(this.value)">
<button onclick="newNote()">+ Note</button>
<button onclick="newFolder()">+ Folder</button><br><br>
<div id="noteArea" class="grid">`;

db[user].folders.forEach((f,i)=>{
h+=`<div class="glass tile folder">📁<br>${f.name}<br>${f.notes.length} notes</div>`;
});

db[user].notes.forEach((n,i)=>{
h+=`<div class="glass tile note" onclick="openNote(${i})">📝<br>${n.title}${n.locked?' 🔒':''}<br><small>${n.folder||'No Folder'}</small></div>`;
});

h+='</div></div>';
view.innerHTML=h;
}

function searchNotes(q){
q=q.toLowerCase();
document.querySelectorAll('.note').forEach(n=>{
n.style.display=n.textContent.toLowerCase().includes(q)?'block':'none';
});
}

function newFolder(){
let n=prompt('Folder name');
if(!n)return;
db[user].folders.push({name:n,notes:[]});
save();notes();
}

function newNote(){
let folder=prompt('Folder name (optional)')||'';
db[user].notes.push({title:'New Note',text:'',locked:false,password:'',folder});
save();notes();
}

function openNote(i){
let n=db[user].notes[i];
if(n.locked){
let p=prompt('Password');
if(p!==n.password){alert('Wrong password');return;}
}
view.innerHTML=`<div class="glass card">
<h2>📝 Note Editor</h2>
<input id="title" value="${(n.title||'').replace(/"/g,'&quot;')}">
<textarea id="text" style="height:250px">${n.text||''}</textarea><br><br>
<button onclick="saveNote(${i})">💾 Save</button>
<button onclick="renameNote(${i})">✏ Rename</button>
<button onclick="lockNote(${i})">🔒 Lock</button>
<button onclick="moveNote(${i})">📁 Move</button>
<button onclick="deleteNote(${i})">🗑 Delete</button>
<button onclick="notes()">⬅ Back</button>
</div>`;
}

function saveNote(i){db[user].notes[i].title=title.value;db[user].notes[i].text=text.value;save();alert('Saved');}
function renameNote(i){let n=prompt('New name',db[user].notes[i].title);if(n){db[user].notes[i].title=n;save();openNote(i);}}
function lockNote(i){let p=prompt('Password');if(!p)return;db[user].notes[i].locked=true;db[user].notes[i].password=p;save();}
function moveNote(i){let f=prompt('Folder name');db[user].notes[i].folder=f||'';save();}
function deleteNote(i){db[user].notes.splice(i,1);save();notes();}

function htmlPlayer(){
view.innerHTML=`<div class="glass card">
<h2>🌐 HTML Project Manager</h2>
<input id="projName" placeholder="Project Name">
<textarea id="code" style="height:220px"><h1>Hello Gold Hub</h1></textarea><br>
<button onclick="saveProject()">💾 Save Project</button>
<button onclick="runHTML()">▶ Run</button><br><br>
<iframe id="preview"></iframe>
</div>`;
}

function saveProject(){
let name=document.getElementById('projName').value||'Untitled';
let code=document.getElementById('code').value;
db[user].projects.push({name,code});
save();
alert('Project saved');
}

function runHTML(){preview.srcdoc=code.value;}
function logout(){localStorage.removeItem('ghuser7');location.reload();}

user?dashboard():loginUI();
</script>
</body>
</html>
