<!--
  Juju OS — a tiny phone on a page.
  A home screen of apps (Juju Browser + Notes, Calculator, Paint, App Maker),
  plus an App Maker so you can build your own apps onto the home screen.
  Custom apps and notes persist via the artifact storage API.
-->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

<style>
  :root{
    --violet:#7b5cff; --violet-2:#9b7bff;
    --jade:#13b8a6; --gold:#e3a52a; --pink:#e0457b; --sky:#4aa3ff;
    --ink:#221733; --muted:#6f6880; --line:#e7e2f0; --paper:#f5f3f9; --card:#fff;
    --radius:22px;
    color-scheme: dark;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; font-family:"Plus Jakarta Sans",system-ui,sans-serif;
    background:#0c0816;
    display:grid; place-items:center;
    -webkit-font-smoothing:antialiased;
  }
  /* ambient glow behind the phone */
  body::before{content:"";position:fixed;inset:-20%;background:
    radial-gradient(40% 40% at 30% 20%, rgba(123,92,255,.35), transparent 70%),
    radial-gradient(45% 45% at 75% 80%, rgba(19,184,166,.22), transparent 70%);
    filter:blur(20px);z-index:0}

  .phone{
    position:relative; z-index:1;
    width:min(430px,100vw); height:100dvh; max-height:932px;
    background:linear-gradient(165deg,#2c1f4d 0%,#1d1433 55%,#140d24 100%);
    overflow:hidden; display:flex; flex-direction:column;
    box-shadow:0 40px 120px rgba(0,0,0,.6);
  }
  @media(min-width:480px){ .phone{ border-radius:46px; border:1px solid rgba(255,255,255,.08); margin:14px 0 } }

  /* status bar */
  .statusbar{
    height:42px; flex:0 0 auto; display:flex; align-items:center; justify-content:space-between;
    padding:0 24px; color:#fff; font-family:"Space Mono",monospace; font-size:13px; letter-spacing:.02em;
  }
  .statusbar .right{display:flex;align-items:center;gap:7px;font-size:12px;opacity:.9}

  .screen{flex:1; position:relative; overflow:hidden}

  /* ---------- home ---------- */
  .home{position:absolute;inset:0;display:flex;flex-direction:column;padding:8px 0 0}
  .home-scroll{flex:1;overflow:auto;padding:14px 22px 10px}
  .greet{color:#fff;margin:6px 4px 22px}
  .greet h1{font-family:"Bricolage Grotesque",serif;font-weight:800;font-size:27px;margin:0;letter-spacing:-.5px}
  .greet p{margin:3px 0 0;color:rgba(255,255,255,.62);font-size:13.5px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px 8px}
  .app{display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;border:none;background:none;padding:0;font-family:inherit}
  .icon{
    width:60px;height:60px;border-radius:19px 19px 19px 7px;display:grid;place-items:center;font-size:29px;
    position:relative;box-shadow:0 8px 20px rgba(0,0,0,.35);transition:transform .12s;
    background:linear-gradient(150deg,var(--c1),var(--c2));
  }
  .icon::after{content:"";position:absolute;inset:0;border-radius:inherit;
    background:linear-gradient(180deg,rgba(255,255,255,.28),transparent 45%);pointer-events:none}
  .app:active .icon{transform:scale(.9)}
  .app .lbl{color:#fff;font-size:12px;font-weight:500;text-align:center;max-width:74px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .app.add .icon{background:rgba(255,255,255,.08);border:1.5px dashed rgba(255,255,255,.35);box-shadow:none;font-weight:300}

  /* dock */
  .dock{flex:0 0 auto;margin:6px 14px 0;padding:14px 12px;background:rgba(255,255,255,.08);
    backdrop-filter:blur(14px);border-radius:30px;display:flex;justify-content:space-around;border:1px solid rgba(255,255,255,.08)}
  .dock .app .lbl{display:none}
  .dock .icon{width:56px;height:56px;font-size:27px}

  /* home indicator */
  .homebar{flex:0 0 auto;height:26px;display:grid;place-items:center;cursor:pointer}
  .homebar::after{content:"";width:128px;height:5px;border-radius:3px;background:rgba(255,255,255,.6)}

  /* ---------- app view ---------- */
  .appview{position:absolute;inset:0;background:var(--paper);display:flex;flex-direction:column;
    animation:appopen .22s cubic-bezier(.2,.8,.2,1);color:var(--ink)}
  @keyframes appopen{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:none}}
  .appbar{flex:0 0 auto;height:50px;display:flex;align-items:center;gap:10px;padding:0 12px;
    background:#fff;border-bottom:1px solid var(--line)}
  .appbar .ai{width:28px;height:28px;border-radius:9px;display:grid;place-items:center;font-size:15px;background:linear-gradient(150deg,var(--c1),var(--c2));flex:0 0 auto}
  .appbar .an{font-family:"Bricolage Grotesque",serif;font-weight:700;font-size:16px;flex:1}
  .appbar button{border:none;background:#f0edf6;color:#5a5170;border-radius:9px;padding:7px 12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
  .appbar button:hover{background:#e7e2f0}
  .appbody{flex:1;position:relative;overflow:auto}
  .appframe{position:absolute;inset:0;width:100%;height:100%;border:none;background:#fff}

  /* generic bits */
  .btn{border:none;border-radius:11px;cursor:pointer;font-family:inherit;font-weight:600;font-size:14px;padding:11px 16px}
  .btn.v{background:var(--violet);color:#fff}.btn.v:hover{background:#6a49f5}
  .btn.j{background:var(--jade);color:#fff}.btn.j:hover{background:#10a292}
  .btn.ghost{background:#efecf6;color:#5a5170}.btn.ghost:hover{background:#e6e1f0}
  .pad{padding:18px}
  .empty{color:var(--muted);font-size:14px;text-align:center;padding:40px 20px}
  input,textarea{font-family:inherit;color:var(--ink)}

  /* browser app */
  .bbar{display:flex;gap:8px;padding:10px 12px;background:#fff;border-bottom:1px solid var(--line);flex:0 0 auto}
  .bbar input{flex:1;height:40px;border:1.5px solid var(--line);border-radius:999px;padding:0 16px;font-family:"Space Mono",monospace;font-size:13px;outline:none;background:var(--paper)}
  .bbar input:focus{border-color:var(--violet)}
  .bbar button{border:none;background:var(--violet);color:#fff;border-radius:999px;width:40px;font-size:15px;cursor:pointer}
  .bstart{padding:26px 22px}
  .bstart h2{font-family:"Bricolage Grotesque",serif;font-size:23px;margin:0 0 4px}
  .bstart p{color:var(--muted);font-size:13.5px;margin:0 0 20px}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 15px;font-size:13px;cursor:pointer;color:var(--ink);font-weight:500}
  .chip:hover{border-color:var(--violet);background:var(--paper)}
  .results{padding:18px}
  .result{padding:13px 0;border-bottom:1px solid var(--line);cursor:pointer}
  .result .h{font-family:"Space Mono",monospace;font-size:11px;color:var(--jade);margin:0 0 3px}
  .result h3{margin:0 0 3px;font-size:15.5px;color:#3a2fae}
  .result:hover h3{text-decoration:underline}
  .result p{margin:0;font-size:13px;color:#544b6a;line-height:1.5}
  .loadrow{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13.5px;padding:20px}
  .spin{width:15px;height:15px;border:2px solid var(--line);border-top-color:var(--violet);border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .fallback{position:absolute;left:0;right:0;top:0;display:flex;gap:10px;align-items:center;padding:9px 14px;background:#fff;border-bottom:1px solid var(--line);font-size:12.5px;color:var(--muted);z-index:2}
  .fallback button{margin-left:auto;border:none;background:var(--violet);color:#fff;border-radius:8px;padding:6px 11px;font-size:12px;font-weight:600;cursor:pointer}

  /* notes */
  .notelist{padding:14px}
  .notecard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer}
  .notecard:hover{border-color:var(--gold)}
  .notecard h3{margin:0 0 4px;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .notecard p{margin:0;font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .noteedit{display:flex;flex-direction:column;height:100%}
  .noteedit input{border:none;border-bottom:1px solid var(--line);padding:16px;font-size:18px;font-weight:700;outline:none;font-family:"Bricolage Grotesque",serif}
  .noteedit textarea{flex:1;border:none;outline:none;resize:none;padding:16px;font-size:15px;line-height:1.6}
  .fab{position:absolute;right:18px;bottom:18px;width:54px;height:54px;border-radius:50%;border:none;background:var(--gold);color:#fff;font-size:26px;cursor:pointer;box-shadow:0 8px 20px rgba(227,165,42,.4);z-index:3}

  /* calculator */
  .calc{display:flex;flex-direction:column;height:100%;background:#1a1330}
  .calcout{flex:1;display:flex;flex-direction:column;align-items:flex-end;justify-content:flex-end;padding:22px;color:#fff}
  .calcout .sub{font-family:"Space Mono",monospace;font-size:15px;color:rgba(255,255,255,.5);min-height:20px}
  .calcout .main{font-family:"Bricolage Grotesque",serif;font-size:54px;font-weight:700;line-height:1;word-break:break-all}
  .keys{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(255,255,255,.08)}
  .keys button{border:none;padding:20px 0;font-size:22px;font-family:inherit;font-weight:600;cursor:pointer;background:#251a40;color:#fff}
  .keys button:active{filter:brightness(1.3)}
  .keys button.op{background:#33265a;color:var(--violet-2)}
  .keys button.eq{background:var(--violet);color:#fff}
  .keys button.fn{background:#2e2250;color:var(--jade)}

  /* paint */
  .paint{display:flex;flex-direction:column;height:100%}
  .pcanvaswrap{flex:1;position:relative;background:#fff}
  #pcanvas{position:absolute;inset:0;touch-action:none;cursor:crosshair}
  .ptools{flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fff;border-top:1px solid var(--line);overflow-x:auto}
  .swatch{width:26px;height:26px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px var(--line);cursor:pointer;flex:0 0 auto}
  .swatch.on{box-shadow:0 0 0 2px var(--ink)}
  .ptools .sz{display:flex;gap:6px;flex:0 0 auto}
  .ptools .sz button{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:#fff;cursor:pointer;display:grid;place-items:center}
  .ptools .sz button.on{border-color:var(--ink)}
  .ptools .sz button span{background:var(--ink);border-radius:50%;display:block}
  .ptools .clr{margin-left:auto;border:none;background:#f0edf6;color:#5a5170;border-radius:9px;padding:8px 13px;font-weight:600;cursor:pointer;flex:0 0 auto}

  /* app maker */
  .mk{padding:16px}
  .mkapp{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px}
  .mkapp .ic{width:42px;height:42px;border-radius:13px 13px 13px 5px;display:grid;place-items:center;font-size:21px;background:linear-gradient(150deg,var(--c1),var(--c2));flex:0 0 auto}
  .mkapp b{flex:1;font-size:15px}
  .mkapp button{border:none;background:#f0edf6;color:#5a5170;border-radius:8px;padding:7px 11px;font-size:12px;font-weight:600;cursor:pointer}
  .mkapp button.del:hover{background:#fbe3dd;color:#c0432a}
  .mkedit{display:flex;flex-direction:column;height:100%}
  .mkform{padding:14px;overflow:auto}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:12px;font-weight:600;color:#5a5170;margin-bottom:5px}
  .field input,.field textarea{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;font-size:14px;outline:none;background:#fff}
  .field input:focus,.field textarea:focus{border-color:var(--violet)}
  .field textarea{min-height:150px;font-family:"Space Mono",monospace;font-size:12.5px;line-height:1.6;resize:vertical}
  .emojis{display:flex;flex-wrap:wrap;gap:6px}
  .emojis button{width:38px;height:38px;border:1px solid var(--line);background:#fff;border-radius:10px;font-size:19px;cursor:pointer}
  .emojis button.on{border-color:var(--violet);background:var(--paper)}
  .colors{display:flex;gap:8px}
  .colors button{width:30px;height:30px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px var(--line);cursor:pointer}
  .colors button.on{box-shadow:0 0 0 2px var(--ink)}
  .mkprev{height:160px;border-top:1px solid var(--line);background:#fff;position:relative;flex:0 0 auto}
  .mkprev .tag{position:absolute;top:6px;left:10px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);z-index:2}
  .mkprev iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
  .mkbtns{flex:0 0 auto;display:flex;gap:10px;padding:12px 14px;border-top:1px solid var(--line);background:#fff}
  .mkbtns .btn{flex:1}

  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

<div class="phone">
  <div class="statusbar">
    <span id="clock">9:41</span>
    <span class="right"><span>juju</span><span>✦ 100%</span></span>
  </div>
  <div class="screen" id="screen"></div>
  <div class="homebar" id="homebar" title="Home"></div>
</div>

<script>
/* ---------- storage ---------- */
const KV = (() => {
  const has = typeof window!=="undefined" && window.storage && window.storage.get;
  const mem = {};
  return {
    async get(k){ if(has){ try{ const r=await window.storage.get(k); return r? r.value : (mem[k]??null);}catch(e){ return mem[k]??null; } } return mem[k]??null; },
    async set(k,v){ mem[k]=v; if(has){ try{ await window.storage.set(k,v);}catch(e){} } }
  };
})();
const CustomApps = {
  async all(){ const r=await KV.get("jujuos_apps"); return r? JSON.parse(r):[]; },
  async save(app){ const list=await this.all(); const i=list.findIndex(a=>a.id===app.id);
    if(i>=0) list[i]=app; else list.push(app); await KV.set("jujuos_apps", JSON.stringify(list)); },
  async remove(id){ const list=(await this.all()).filter(a=>a.id!==id); await KV.set("jujuos_apps", JSON.stringify(list)); }
};
const Notes = {
  async all(){ const r=await KV.get("jujuos_notes"); return r? JSON.parse(r):[]; },
  async save(n){ const list=await this.all(); const i=list.findIndex(x=>x.id===n.id);
    if(i>=0) list[i]=n; else list.unshift(n); await KV.set("jujuos_notes", JSON.stringify(list)); },
  async remove(id){ const list=(await this.all()).filter(x=>x.id!==id); await KV.set("jujuos_notes", JSON.stringify(list)); }
};

/* ---------- helpers ---------- */
const $ = (s,r=document)=>r.querySelector(s);
const el=(t,c,h)=>{const n=document.createElement(t);if(c)n.className=c;if(h!=null)n.innerHTML=h;return n;};
const esc=s=>String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const uid=()=>"a"+Math.random().toString(36).slice(2,8);
const screen=$("#screen");

/* ---------- clock ---------- */
function tickClock(){ $("#clock").textContent = new Date().toLocaleTimeString([], {hour:"numeric",minute:"2-digit"}); }
tickClock(); setInterval(tickClock, 10000);

/* ---------- built-in apps ---------- */
const BUILTINS = [
  { id:"browser", name:"Juju Browser", icon:"🌐", c1:"#7b5cff", c2:"#9b7bff", dock:true, render:appBrowser },
  { id:"notes",   name:"Notes",        icon:"📝", c1:"#e3a52a", c2:"#f0c45b", dock:true, render:appNotes },
  { id:"calc",    name:"Calculator",   icon:"🧮", c1:"#13b8a6", c2:"#3fd6c6", render:appCalc },
  { id:"paint",   name:"Paint",        icon:"🎨", c1:"#e0457b", c2:"#ff7aa8", dock:true, render:appPaint },
  { id:"maker",   name:"App Maker",    icon:"🛠️", c1:"#6a49f5", c2:"#13b8a6", dock:true, render:appMaker },
];

/* ---------- home ---------- */
async function renderHome(){
  const custom = await CustomApps.all();
  const hour = new Date().getHours();
  const hi = hour<5?"Late night":hour<12?"Good morning":hour<18?"Good afternoon":"Good evening";

  const home = el("div","home");
  const scroll = el("div","home-scroll");
  scroll.appendChild(el("div","greet",`<h1>${hi}</h1><p>Tap an app — or make your own.</p>`));

  const grid = el("div","grid");
  const drawn = BUILTINS.filter(a=>!a.dock || true); // show all builtins in grid too
  for (const a of BUILTINS) grid.appendChild(appButton(a));
  for (const a of custom) grid.appendChild(appButton(customAsApp(a), true, a));
  // add-app tile
  const add = el("button","app add",`<div class="icon">＋</div><span class="lbl">New app</span>`);
  add.onclick = ()=> openApp(BUILTINS.find(a=>a.id==="maker"));
  grid.appendChild(add);
  scroll.appendChild(grid);
  home.appendChild(scroll);

  // dock
  const dock = el("div","dock");
  for (const a of BUILTINS.filter(a=>a.dock)) dock.appendChild(appButton(a));
  home.appendChild(dock);

  screen.innerHTML=""; screen.appendChild(home);
}
function appButton(app, isCustom, raw){
  const b = el("button","app",
    `<div class="icon" style="--c1:${app.c1};--c2:${app.c2}">${app.icon}</div><span class="lbl">${esc(app.name)}</span>`);
  b.onclick = ()=> openApp(app, raw);
  return b;
}
function customAsApp(a){ return { id:a.id, name:a.name, icon:a.icon||"✨", c1:a.color||"#7b5cff", c2:"#9b7bff", custom:true, html:a.html }; }

/* ---------- app shell ---------- */
let activeCanvasCleanup = null;
function openApp(app, raw){
  if (activeCanvasCleanup){ activeCanvasCleanup(); activeCanvasCleanup=null; }
  const view = el("div","appview");
  const bar = el("div","appbar",
    `<div class="ai" style="--c1:${app.c1};--c2:${app.c2}">${app.icon}</div>
     <div class="an">${esc(app.name)}</div>
     <button id="apphome">Home</button>`);
  view.appendChild(bar);
  const body = el("div","appbody"); view.appendChild(body);
  screen.innerHTML=""; screen.appendChild(view);
  $("#apphome").onclick = goHome;

  if (app.custom){ runCustomApp(body, app); }
  else app.render(body);
}
function goHome(){ if(activeCanvasCleanup){activeCanvasCleanup();activeCanvasCleanup=null;} renderHome(); }
$("#homebar").onclick = goHome;
document.addEventListener("keydown", e=>{ if(e.key==="Escape") goHome(); });

function runCustomApp(body, app){
  const f = el("iframe","appframe");
  f.setAttribute("sandbox","allow-scripts allow-forms allow-popups allow-modals");
  f.srcdoc = app.html;
  body.appendChild(f);
}

/* =====================================================================
   APP: Juju Browser (compact)
   ===================================================================== */
function appBrowser(body){
  body.innerHTML = `
    <div style="display:flex;flex-direction:column;height:100%">
      <div class="bbar">
        <input id="burl" placeholder="Search or type a link…" autocomplete="off" />
        <button id="bgo">→</button>
      </div>
      <div id="bview" style="flex:1;position:relative;overflow:auto"></div>
    </div>`;
  const view=$("#bview");
  start();

  function start(){
    $("#burl").value="";
    view.innerHTML = `
      <div class="bstart">
        <h2>Juju Browser</h2>
        <p>Search the web, or type a link to open it.</p>
        <div class="chips" id="chips"></div>
      </div>`;
    const quick=[["Wikipedia","https://www.wikipedia.org"],["MDN","https://developer.mozilla.org"],
                 ["example.com","https://example.com"],["Hacker News","https://news.ycombinator.com"]];
    const c=$("#chips");
    for(const [n,u] of quick){ const b=el("button","chip",n); b.onclick=()=>open(u); c.appendChild(b); }
  }
  function go(){ const v=$("#burl").value.trim(); if(!v) return;
    if(/^(https?:\/\/)/i.test(v) || /^[\w-]+(\.[\w-]+)+(\/.*)?$/.test(v)) open(/^https?:/i.test(v)?v:"https://"+v);
    else search(v);
  }
  $("#bgo").onclick=go;
  $("#burl").addEventListener("keydown",e=>{ if(e.key==="Enter") go(); });

  function open(url){
    $("#burl").value=url;
    let host=url; try{host=new URL(url).hostname.replace(/^www\./,"");}catch(e){}
    view.innerHTML="";
    const fb=el("div","fallback",`<div class="spin"></div><span>Loading ${esc(host)}…</span><button id="ext">Open for real ↗</button>`);
    view.appendChild(fb);
    const f=el("iframe","appframe"); f.src=url; f.style.position="absolute"; f.style.inset="0"; view.appendChild(f);
    let loaded=false;
    f.addEventListener("load",()=>{loaded=true; fb.remove();});
    setTimeout(()=>{ if(!loaded){ fb.innerHTML=`<span>${esc(host)} won't open inside Juju (it blocks embedding).</span><button id="ext">Open for real ↗</button>`; bindExt(); } },3500);
    function bindExt(){ const e2=$("#ext"); if(e2) e2.onclick=()=>window.open(url,"_blank","noopener"); }
    bindExt();
  }

  async function search(q){
    $("#burl").value=q;
    view.innerHTML=`<div class="results"><div class="loadrow"><div class="spin"></div> Searching…</div><div id="rl"></div>
      <div style="margin-top:14px"><button class="chip" id="goog">Open “${esc(q)}” on Google ↗</button></div></div>`;
    $("#goog").onclick=()=>window.open("https://www.google.com/search?q="+encodeURIComponent(q),"_blank","noopener");
    let items=[];
    try{ items = await searchWeb(q); }catch(e){ items=[]; }
    const rl=$("#rl"); if(!rl) return;
    view.querySelector(".loadrow")?.remove();
    if(!items.length){ rl.innerHTML=`<p class="empty">No quick results — try the Google button.</p>`; return; }
    for(const r of items){
      let host=r.url; try{host=new URL(r.url).hostname.replace(/^www\./,"");}catch(e){}
      const d=el("div","result",`<p class="h">${esc(host)}${r.src?" · "+esc(r.src):""}</p><h3>${esc(r.title)}</h3><p>${esc(r.snippet||"")}</p>`);
      d.onclick=()=>open(r.url); rl.appendChild(d);
    }
  }
}
async function searchWeb(q){
  const out=[], seen=new Set();
  const [d,w]=await Promise.allSettled([
    fetch("https://api.duckduckgo.com/?format=json&no_html=1&skip_disambig=1&q="+encodeURIComponent(q)).then(r=>r.json()),
    fetch("https://en.wikipedia.org/w/api.php?action=query&list=search&format=json&origin=*&srlimit=5&srsearch="+encodeURIComponent(q)).then(r=>r.json())
  ]);
  const push=r=>{ if(!r||!r.url)return; const k=r.url.replace(/\/+$/,""); if(seen.has(k))return; seen.add(k); out.push(r); };
  if(d.status==="fulfilled"&&d.value){ const v=d.value;
    if(v.AbstractURL&&v.Heading) push({title:v.Heading,url:v.AbstractURL,snippet:v.AbstractText||"",src:"Web"});
    (v.Results||[]).slice(0,2).forEach(x=>x.FirstURL&&push({title:stripTags(x.Text)||x.FirstURL,url:x.FirstURL,snippet:"",src:"Web"}));
    (v.RelatedTopics||[]).forEach(x=>x.FirstURL&&push({title:stripTags(x.Text)||x.FirstURL,url:x.FirstURL,snippet:"",src:"Web"}));
  }
  if(w.status==="fulfilled"&&w.value?.query?.search){ for(const s of w.value.query.search)
    push({title:s.title,url:"https://en.wikipedia.org/wiki/"+encodeURIComponent(s.title.replace(/ /g,"_")),snippet:stripTags(s.snippet)+"…",src:"Wikipedia"}); }
  return out.slice(0,8);
}
function stripTags(s){ try{ return new DOMParser().parseFromString(String(s),"text/html").body.textContent||""; }catch(e){ return String(s).replace(/<[^>]+>/g,""); } }

/* =====================================================================
   APP: Calculator
   ===================================================================== */
function appCalc(body){
  let cur="0", prev=null, op=null, fresh=true, expr="";
  body.innerHTML=`
    <div class="calc">
      <div class="calcout"><div class="sub" id="csub"></div><div class="main" id="cmain">0</div></div>
      <div class="keys" id="ckeys"></div>
    </div>`;
  const keys=[["C","fn"],["±","fn"],["%","fn"],["÷","op"],
              ["7"],["8"],["9"],["×","op"],
              ["4"],["5"],["6"],["−","op"],
              ["1"],["2"],["3"],["+","op"],
              ["0"],["."],["⌫","fn"],["=","eq"]];
  const grid=$("#ckeys");
  for(const [k,cls] of keys){ const b=el("button",cls||"",k); b.onclick=()=>press(k); grid.appendChild(b); }
  const draw=()=>{ $("#cmain").textContent=cur; $("#csub").textContent=expr; };
  function num(n){ if(fresh){ cur=(n==="."?"0.":n); fresh=false; } else { if(n==="."&&cur.includes("."))return; cur=cur==="0"&&n!=="."?n:cur+n; } draw(); }
  function setOp(o){ if(op&&!fresh){ calc(); } prev=parseFloat(cur); op=o; fresh=true; expr=trim(prev)+" "+o; draw(); }
  function calc(){ if(op===null||prev===null)return; const b=parseFloat(cur); let r=prev;
    if(op==="+")r=prev+b; else if(op==="−")r=prev-b; else if(op==="×")r=prev*b; else if(op==="÷")r=b===0?NaN:prev/b;
    cur=isNaN(r)?"Error":trim(r); expr=""; op=null; prev=null; fresh=true; draw(); }
  function trim(n){ return (Math.round(n*1e10)/1e10).toString(); }
  function press(k){
    if(/[0-9.]/.test(k)) return num(k);
    if(k==="+"||k==="−"||k==="×"||k==="÷") return setOp(k);
    if(k==="=") return calc();
    if(k==="C"){ cur="0";prev=null;op=null;fresh=true;expr=""; return draw(); }
    if(k==="⌫"){ cur=cur.length>1?cur.slice(0,-1):"0"; return draw(); }
    if(k==="±"){ cur=trim(parseFloat(cur)*-1); return draw(); }
    if(k==="%"){ cur=trim(parseFloat(cur)/100); return draw(); }
  }
  const onkey=e=>{ const k=e.key;
    if(/[0-9.]/.test(k))press(k); else if(k==="+")press("+"); else if(k==="-")press("−");
    else if(k==="*")press("×"); else if(k==="/")press("÷"); else if(k==="Enter"||k==="=")press("=");
    else if(k==="Backspace")press("⌫"); else if(k==="Escape"||k==="c"||k==="C")press("C"); };
  document.addEventListener("keydown",onkey);
  activeCanvasCleanup=()=>document.removeEventListener("keydown",onkey);
  draw();
}

/* =====================================================================
   APP: Paint
   ===================================================================== */
function appPaint(body){
  body.innerHTML=`
    <div class="paint">
      <div class="pcanvaswrap"><canvas id="pcanvas"></canvas></div>
      <div class="ptools" id="ptools">
        <div class="sz" id="psz"></div>
      </div>
    </div>`;
  const wrap=$(".pcanvaswrap"), canvas=$("#pcanvas"), ctx=canvas.getContext("2d");
  let color="#7b5cff", size=4, drawing=false, last=null;
  const colors=["#221733","#7b5cff","#13b8a6","#e3a52a","#e0457b","#4aa3ff","#2ec27e","#ffffff"];
  const tools=$("#ptools");
  colors.forEach((c,i)=>{ const s=el("div","swatch"+(i===1?" on":"")); s.style.background=c;
    s.onclick=()=>{ color=c; tools.querySelectorAll(".swatch").forEach(x=>x.classList.remove("on")); s.classList.add("on"); };
    tools.insertBefore(s, $("#psz")); });
  const sizes=[[2,8],[4,12],[8,18]]; const szwrap=$("#psz");
  sizes.forEach(([sz,d],i)=>{ const b=el("button",i===1?"on":""); const dot=el("span"); dot.style.width=d+"px"; dot.style.height=d+"px"; b.appendChild(dot);
    b.onclick=()=>{ size=sz; szwrap.querySelectorAll("button").forEach(x=>x.classList.remove("on")); b.classList.add("on"); }; szwrap.appendChild(b); });
  const clr=el("button","clr","Clear"); clr.onclick=()=>ctx.clearRect(0,0,canvas.width,canvas.height); tools.appendChild(clr);

  function fit(){ const r=wrap.getBoundingClientRect(); canvas.width=r.width; canvas.height=r.height; }
  requestAnimationFrame(fit);
  const pos=e=>{ const r=canvas.getBoundingClientRect(); const t=e.touches?e.touches[0]:e; return {x:t.clientX-r.left,y:t.clientY-r.top}; };
  const down=e=>{ drawing=true; last=pos(e); e.preventDefault(); };
  const move=e=>{ if(!drawing)return; const p=pos(e);
    ctx.strokeStyle=color; ctx.lineWidth=size; ctx.lineCap="round"; ctx.lineJoin="round";
    ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke(); last=p; e.preventDefault(); };
  const up=()=>{ drawing=false; };
  canvas.addEventListener("pointerdown",down); canvas.addEventListener("pointermove",move);
  window.addEventListener("pointerup",up);
  activeCanvasCleanup=()=>window.removeEventListener("pointerup",up);
}

        </div>

          <div class="field"><label>App name</label><input id="mname" maxlength="20" value="${esc(st.name)}" placeholder="My App" /></div>
          <div class="field"><label>Icon</label><div class="emojis" id="memo"></div></div>
          <div class="field"><label>Color</label><div class="colors" id="mcol"></div></div>
          <div class="field"><label>What it does (HTML)</label><textarea id="mhtml" spellcheck="false">${esc(st.html)}</textarea></div>
        </div>
        <div class="mkprev"><span class="tag">Live preview</span><iframe id="mprev" sandbox="allow-scripts allow-forms allow-popups allow-modals"></iframe></div>
        <div class="mkbtns"><button class="btn ghost" id="mcancel">Cancel</button><button class="btn v" id="msave">Save app</button></div>
      </div>`;
    const emojis=["✨","🎮","⭐","🎵","📷","🐱","🚀","🍕","⚽","🎲","💡","🔥","🌈","👾","📓","🧩"];
    const me=$("#memo");
    emojis.forEach(e=>{ const b=el("button",e===st.icon?"on":"",e); b.onclick=()=>{ st.icon=e; me.querySelectorAll("button").forEach(x=>x.classList.remove("on")); b.classList.add("on"); }; me.appendChild(b); });
    const cols=["#7b5cff","#13b8a6","#e3a52a","#e0457b","#4aa3ff","#2ec27e"];
    const mc=$("#mcol");
    cols.forEach(c=>{ const b=el("button",c===st.color?"on":""); b.style.background=c; b.onclick=()=>{ st.color=c; mc.querySelectorAll("button").forEach(x=>x.classList.remove("on")); b.classList.add("on"); }; mc.appendChild(b); });
    const prev=$("#mprev"), code=$("#mhtml");

    $("#msave").onclick=async ()=>{ if(!st.name.trim()){ $("#mname").focus(); return; }

      goHome(); };
  }
  list();
}
